<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라인업 관리 | 레이 마린스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page">
  <header class="top-title"><h1>레이 마린스</h1><a class="top-link" href="admin.html">관리자 홈</a></header>
  <nav class="menu">
    <a href="admin.html">관리자 홈</a>
    <a href="admin-lineup.html" class="active">라인업 관리</a>
    <a href="admin-lineup-history.html">라인업 기록</a>
    <a href="admin-pitchers.html">투수 정보</a>
    <a href="admin-scoresheet.html">경기 기록</a>
    <a href="admin-record-history.html">기록 내역</a>
  </nav>
  <section class="main-box">
    <span class="badge">LINEUP EDIT</span>
    <h2 class="main-box-title">라인업 관리</h2>
    <p class="main-box-desc">연습경기와 리그 경기 라인업을 따로 저장하고 미리보기까지 확인해요.</p>
    <div class="toolbar">
      <div class="seg-group">
        <button class="seg-btn active" data-type="practice">연습경기</button>
        <button class="seg-btn" data-type="league">리그 경기</button>
      </div>
      <input id="gameDateEdit" type="date" class="input" style="max-width:220px;">
    </div>
    <div class="split-grid" style="margin-top:20px;">
      <section class="surface" style="padding:24px;">
        <div class="item-title">현재 저장된 라인업</div>
        <div id="viewBox" class="list-stack" style="margin-top:18px;"><div class="item-card"><div class="empty-text">라인업을 불러오는 중...</div></div></div>
      </section>
      <section class="surface" style="padding:24px;">
        <div class="item-title">라인업 입력</div>
        <div class="toolbar"><select id="pitcher" class="select" style="max-width:260px;"><option value="">선발투수 선택</option></select></div>
        <table class="list-table" style="margin-top:10px;">
          <thead><tr><th style="width:70px;">타순</th><th>선수</th><th>포지션</th><th>타석</th></tr></thead>
          <tbody id="lineupBody"></tbody>
        </table>
        <div class="toolbar"><button id="saveBtn" class="primary-btn">저장</button><button id="resetBtn" class="secondary-btn">초기화</button></div>
      </section>
    </div>
  </section>
</div>
<script type="module">
  import { db } from "./firebase-config.js";
  import { doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
  const isStaff = currentUser && ["super_admin","admin","scorer"].includes(currentUser.role);
  if (!isStaff) { alert('접근 권한이 없어.'); location.href = 'index.html'; }
  const lineupBody = document.getElementById('lineupBody');
  const saveBtn = document.getElementById('saveBtn');
  const resetBtn = document.getElementById('resetBtn');
  const pitcherSelect = document.getElementById('pitcher');
  const viewBox = document.getElementById('viewBox');
  const gameDateEdit = document.getElementById('gameDateEdit');
  const typeButtons = [...document.querySelectorAll('.seg-btn')];
  let rosterPlayers = []; let currentType = 'practice';
  const positionList = ['P','C','1B','2B','3B','SS','LF','CF','RF'];
  function getDisplayName(user){ return user.rosterNick && user.rosterNick.trim() ? user.rosterNick.trim() : user.mcNick; }
  function getDefaultDate(){ const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`; }
  function docId(date, type){ return `${type}_${date}`; }
  function typeLabel(type){ return type === 'league' ? '리그 경기' : '연습경기'; }
  function createLineupInputs(){
    lineupBody.innerHTML='';
    for(let i=1;i<=9;i++){
      const row = document.createElement('tr');
      row.innerHTML = `<td>${i}</td><td><select id="name-${i}" class="select"><option value="">선수 선택</option></select></td><td><select id="pos-${i}" class="select"><option value="">포지션 선택</option>${positionList.map(pos=>`<option value="${pos}">${pos}</option>`).join('')}</select></td><td><select id="bat-${i}" class="select"><option value="">선택</option><option value="우타">우타</option><option value="좌타">좌타</option><option value="양타">양타</option></select></td>`;
      lineupBody.appendChild(row);
    }
  }
  function fillRosterOptions(){
    const sorted = [...rosterPlayers].sort((a,b)=>getDisplayName(a).localeCompare(getDisplayName(b), 'ko'));
    pitcherSelect.innerHTML = '<option value="">선발투수 선택</option>';
    sorted.forEach(player=>{ const name=getDisplayName(player); pitcherSelect.innerHTML += `<option value="${name}">${name}</option>`; });
    for(let i=1;i<=9;i++){
      const select = document.getElementById(`name-${i}`);
      select.innerHTML = '<option value="">선수 선택</option>' + sorted.map(player=>{ const name=getDisplayName(player); return `<option value="${name}">${name}</option>`; }).join('');
    }
  }
  function fillInputs(data){ pitcherSelect.value = data?.pitcher || ''; for(let i=1;i<=9;i++){ const player=data?.players?.find(p=>p.order===i); document.getElementById(`name-${i}`).value=player?.name||''; document.getElementById(`pos-${i}`).value=player?.position||''; document.getElementById(`bat-${i}`).value=player?.batting||''; } }
  function resetInputsOnly(){ pitcherSelect.value=''; for(let i=1;i<=9;i++){ document.getElementById(`name-${i}`).value=''; document.getElementById(`pos-${i}`).value=''; document.getElementById(`bat-${i}`).value=''; } }
  function renderView(data){
    if(!data || !data.players || data.players.length===0){ viewBox.innerHTML = '<div class="item-card"><div class="empty-text">저장된 라인업이 없어.</div></div>'; return; }
    let html = `<div class="item-card"><div class="item-top"><div><div class="item-title">선발투수</div><div class="item-meta">${data.pitcher || '-'}</div></div><span class="record-chip ${currentType==='league'?'league':'practice'}">${typeLabel(currentType)}</span></div></div>`;
    data.players.forEach(player=>{ html += `<div class="item-card"><div class="item-top"><div class="item-title">${player.order}번 ${player.name || '-'}</div><div class="item-meta">${player.position || '-'} ${player.batting ? '· ' + player.batting : ''}</div></div></div>`; });
    viewBox.innerHTML = html;
  }
  async function loadLineupByDate(dateStr){
    if(!dateStr){ renderView(null); return; }
    let snap = await getDoc(doc(db, 'lineups', docId(dateStr, currentType)));
    if(!snap.exists() && currentType === 'league') snap = await getDoc(doc(db, 'lineups', dateStr));
    if(snap.exists()){ const data = snap.data(); renderView(data); fillInputs(data); } else { renderView(null); resetInputsOnly(); }
  }
  function getLineupData(){ const players=[]; for(let i=1;i<=9;i++){ players.push({ order:i, name:document.getElementById(`name-${i}`).value.trim(), position:document.getElementById(`pos-${i}`).value.trim(), batting:document.getElementById(`bat-${i}`).value.trim() }); } return { gameDate: gameDateEdit.value, gameType: currentType, pitcher: pitcherSelect.value.trim(), players, updatedAt: Date.now(), updatedBy: currentUser?.mcNick || currentUser?.email || 'admin' }; }
  async function saveLineup(){ const data = getLineupData(); if(!data.gameDate){ alert('날짜를 선택해줘.'); return; } saveBtn.disabled=true; saveBtn.textContent='저장 중...'; try { const id = docId(data.gameDate, currentType); await setDoc(doc(db, 'lineups', id), data); await addDoc(collection(db, 'lineup_logs'), { lineupId:id, gameDate:data.gameDate, gameType:data.gameType, pitcher:data.pitcher, players:data.players, updatedAt:data.updatedAt, updatedBy:data.updatedBy }); alert('라인업 저장 완료!'); await loadLineupByDate(data.gameDate); } catch(error){ console.error(error); alert('라인업 저장 중 오류가 발생했어.'); } finally { saveBtn.disabled=false; saveBtn.textContent='저장'; } }
  function resetAll(){ gameDateEdit.value=getDefaultDate(); resetInputsOnly(); loadLineupByDate(gameDateEdit.value); }
  createLineupInputs();
  gameDateEdit.value=getDefaultDate();
  saveBtn.addEventListener('click', saveLineup); resetBtn.addEventListener('click', resetAll); gameDateEdit.addEventListener('change', ()=>loadLineupByDate(gameDateEdit.value));
  typeButtons.forEach(btn=>btn.addEventListener('click', ()=>{ currentType = btn.dataset.type; typeButtons.forEach(b=>b.classList.toggle('active', b===btn)); loadLineupByDate(gameDateEdit.value); }));
  const rosterQuery = query(collection(db, 'users'), where('approved','==', true));
  onSnapshot(rosterQuery, (snapshot)=>{ rosterPlayers=[]; snapshot.forEach(docu=>rosterPlayers.push({id:docu.id, ...docu.data()})); fillRosterOptions(); loadLineupByDate(gameDateEdit.value); });
</script>
</body>
</html>
