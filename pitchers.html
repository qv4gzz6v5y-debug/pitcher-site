<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>투수 정보</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .pitcher-wrap {
      width: 95%;
      max-width: 1100px;
      margin: 34px auto;
    }

    .pitcher-card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .pitcher-card h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 34px;
    }

    .pitcher-input {
      width: 100%;
      box-sizing: border-box;
      margin: 10px 0;
      padding: 14px 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 18px;
      background: #fff;
    }

    .team-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: bold;
    }

    .team-logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border-radius: 50%;
      background: white;
    }

    .list-item {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      text-align: left;
    }

    .list-item p {
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
    }

    .page-note {
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    .staff-link {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #1b65ba;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="index.html">메인으로</a>
    </div>

    <div class="menu">
      <a href="roster.html">로스터</a>
      <a href="pitchers.html">투수 정보</a>
      <a href="lineup.html">라인업</a>
      <a href="record.html">기록실</a>
      <a href="scoresheet.html">기록지</a>
      <a href="mypage.html">마이페이지</a>
    </div>
  </div>

  <div class="pitcher-wrap">
    <div class="pitcher-card">
      <h2>투수 정보</h2>
      <p class="page-note">검색해서 투수 정보를 확인할 수 있습니다.</p>
      <input
        id="searchInput"
        class="pitcher-input"
        placeholder="닉네임 검색"
        oninput="searchPitchers()"
      >
      <a id="manageLink" class="staff-link hidden" href="pitchers-manage.html">투수 정보 관리 페이지로 이동</a>
    </div>

    <div class="pitcher-card">
      <h2>검색 결과</h2>
      <div id="list"></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
    const manageLink = document.getElementById("manageLink");
    const list = document.getElementById("list");

    const teamColors = {
      "KRA": "#c40000",
      "RMS": "#c9982c",
      "NDG": "#120725",
      "CPX": "#1B65BA",
      "CLP": "#0cb218",
      "SLU": "#850000",
      "IH": "#FEC804",
      "ODV": "#FF6A00"
    };

    const teamLogos = {
      "KRA": "logos/크라켄즈.png",
      "RMS": "logos/마린스.jpg",
      "NDG": "logos/드래곤즈.png",
      "CPX": "logos/청피.png",
      "CLP": "logos/플랜츠.png",
      "SLU": "logos/슬러거즈.png",
      "IH": "logos/호네츠.png",
      "ODV": "logos/오버드라이브.png"
    };

    let pitchers = [];

    function isStaff(user) {
      if (!user) return false;
      return user.role === "super_admin" || user.role === "admin" || user.role === "scorer";
    }

    if (isStaff(currentUser)) {
      manageLink.classList.remove("hidden");
    }

    function renderPitchers(keyword = "") {
      list.innerHTML = "";

      if (pitchers.length === 0) {
        list.innerHTML = `<div class="list-item"><p>등록된 투수 정보가 없습니다.</p></div>`;
        return;
      }

      const filtered = pitchers.filter(p =>
        (p.name || "").toLowerCase().includes(keyword.toLowerCase())
      );

      if (filtered.length === 0) {
        list.innerHTML = `<div class="list-item"><p>검색 결과가 없어.</p></div>`;
        return;
      }

      const grouped = {};
      filtered.forEach(p => {
        if (!grouped[p.team]) grouped[p.team] = [];
        grouped[p.team].push(p);
      });

      Object.keys(grouped).forEach(team => {
        const color = teamColors[team] || "#999";
        const logo = teamLogos[team] || "";

        list.innerHTML += `
          <div class="team-title" style="color:${color}">
            ${logo ? `<img src="${logo}" class="team-logo" alt="${team} 로고">` : ""}
            ${team}
          </div>
        `;

        grouped[team].forEach(p => {
          list.innerHTML += `
            <div class="list-item" style="border-left:6px solid ${color}">
              <p>${p.text}</p>
            </div>
          `;
        });
      });
    }

    window.searchPitchers = function () {
      const keyword = document.getElementById("searchInput").value.trim();
      renderPitchers(keyword);
    };

    onSnapshot(
      collection(db, "pitchers"),
      (snapshot) => {
        pitchers = [];
        snapshot.forEach((doc) => {
          pitchers.push({
            id: doc.id,
            ...doc.data()
          });
        });
        searchPitchers();
      },
      (error) => {
        console.error(error);
        list.innerHTML = `<div class="list-item"><p>투수 정보를 불러오지 못했습니다.</p></div>`;
      }
    );
  </script>
</body>
</html>
