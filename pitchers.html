<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레이 마린스 - 투수 정보</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .pitchers-page-wrap {
      width: min(1100px, calc(100% - 32px));
      margin: 34px auto;
    }
    .pitchers-hero {
      max-width: 900px;
      margin: 48px auto 0;
      background: #f8f8f8;
      border: 1px solid #e5e5e5;
      border-radius: 24px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.02);
      padding: 32px;
    }
    .pitchers-hero h2 {
      margin: 0;
      font-size: 64px;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    .pitchers-hero p {
      margin: 16px 0 0;
      font-size: 22px;
      font-weight: 300;
      color: #666;
      line-height: 1.6;
    }
    .search-card {
      margin-top: 32px;
      background: #fff;
      border: 1px solid #d6d6d6;
      border-radius: 18px;
      padding: 24px;
    }
    .search-label {
      display: block;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .search-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      height: 56px;
      border: 1px solid #cccccc;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 18px;
      background: #fff;
    }
    .search-btn {
      min-width: 84px;
      height: 56px;
      border-radius: 16px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .search-status {
      margin-top: 16px;
      font-size: 16px;
      color: #666;
    }
    .result-box {
      display: none;
      margin-top: 20px;
      border-top: 1px solid #ececec;
      padding-top: 20px;
    }
    .result-name {
      margin: 0 0 16px;
      font-size: 42px;
      font-weight: 800;
    }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .result-card {
      background: #fafafa;
      border: 1px solid #e2e2e2;
      border-radius: 14px;
      padding: 16px;
    }
    .result-card .k {
      font-size: 13px;
      letter-spacing: .08em;
      color: #7a7a7a;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .result-card .v {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.5;
      word-break: keep-all;
    }
    @media (max-width: 768px) {
      .pitchers-page-wrap { width: min(100%, calc(100% - 24px)); }
      .pitchers-hero { margin-top: 32px; padding: 24px; }
      .pitchers-hero h2 { font-size: 42px; }
      .pitchers-hero p { font-size: 18px; }
      .search-row { flex-direction: column; }
      .search-input, .search-btn { width: 100%; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="index.html">메인으로</a>
    </div>

    <div class="menu">
      <a href="roster.html">로스터</a>
      <a href="pitchers.html" class="current">투수 정보</a>
      <a href="lineup.html">라인업</a>
      <a href="record.html">기록실</a>
      <a href="scoresheet.html">기록지</a>
      <a href="mypage.html">마이페이지</a>
    </div>
  </div>

  <div class="pitchers-page-wrap">
    <section class="pitchers-hero">
      <h2>투수 정보</h2>
      <p>투수 닉네임을 검색하면 해당 투수의 정보를 확인할 수 있습니다.</p>

      <div class="search-card">
        <label for="searchInput" class="search-label">투수 닉네임 검색</label>
        <div class="search-row">
          <input type="text" id="searchInput" class="search-input" placeholder="투수 닉네임을 입력하세요" list="pitcherList" autocomplete="off" />
          <datalist id="pitcherList"></datalist>
          <button type="button" class="search-btn" id="searchBtn">검색</button>
        </div>
        <p id="loadingText" class="search-status">투수 목록 불러오는 중...</p>
        <p id="emptyText" class="search-status" style="display:none;">검색창에 투수 닉네임을 입력한 뒤 엔터를 누르거나 검색 버튼을 눌러주세요.</p>

        <div id="resultBox" class="result-box"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { db, auth } from "./firebase-config.js";
    import { collection, getDocs, query, where, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const searchInput = document.getElementById("searchInput");
    const pitcherList = document.getElementById("pitcherList");
    const searchBtn = document.getElementById("searchBtn");
    const resultBox = document.getElementById("resultBox");
    const emptyText = document.getElementById("emptyText");
    const loadingText = document.getElementById("loadingText");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function showGuide(message) {
      resultBox.style.display = "none";
      resultBox.innerHTML = "";
      emptyText.style.display = "block";
      emptyText.textContent = message;
    }

    function renderPitcher(pitcher) {
      const name = escapeHtml(pitcher.nickname || pitcher.name || "-");
      const speed = escapeHtml(pitcher.speed || pitcher.velocity || "-");
      const type = escapeHtml(pitcher.throwBat || pitcher.type || "-");
      const control = escapeHtml(pitcher.control || "-");
      const stamina = escapeHtml(pitcher.stamina || "-");
      let pitchTypes = "-";
      if (Array.isArray(pitcher.pitchTypes)) pitchTypes = pitcher.pitchTypes.map(v => escapeHtml(v)).join(", ");
      else if (typeof pitcher.pitchTypes === "string") pitchTypes = escapeHtml(pitcher.pitchTypes);
      else if (Array.isArray(pitcher.pitches)) pitchTypes = pitcher.pitches.map(v => escapeHtml(v)).join(", ");

      resultBox.innerHTML = `
        <h3 class="result-name">${name}</h3>
        <div class="result-grid">
          <div class="result-card"><div class="k">구속</div><div class="v">${speed}</div></div>
          <div class="result-card"><div class="k">투타</div><div class="v">${type}</div></div>
          <div class="result-card"><div class="k">구종</div><div class="v">${pitchTypes}</div></div>
          <div class="result-card"><div class="k">제구</div><div class="v">${control}</div></div>
          <div class="result-card"><div class="k">스태미너</div><div class="v">${stamina}</div></div>
        </div>`;
      resultBox.style.display = "block";
      emptyText.style.display = "none";
    }

    function bindPitcherNamesRealtime() {
      const q = query(collection(db, "pitchers"));
      onSnapshot(q, (snapshot) => {
        const names = new Set();
        pitcherList.innerHTML = "";
        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const nickname = (data.nickname || data.name || "").trim();
          if (!nickname || names.has(nickname)) return;
          names.add(nickname);
          const option = document.createElement("option");
          option.value = nickname;
          pitcherList.appendChild(option);
        });
        loadingText.style.display = "none";
        emptyText.style.display = "block";
      }, (error) => {
        console.error("투수 목록 실시간 불러오기 실패:", error);
        loadingText.style.display = "none";
        emptyText.style.display = "block";
        emptyText.textContent = "투수 목록을 불러오지 못했습니다.";
      });
    }

    async function searchPitcher() {
      const keyword = searchInput.value.trim();
      if (!keyword) { showGuide("검색창에 투수 닉네임을 입력한 뒤 엔터를 누르거나 검색 버튼을 눌러주세요."); return; }
      try {
        let q = query(collection(db, "pitchers"), where("nickname", "==", keyword), limit(1));
        let snapshot = await getDocs(q);
        if (snapshot.empty) {
          q = query(collection(db, "pitchers"), where("name", "==", keyword), limit(1));
          snapshot = await getDocs(q);
        }
        if (snapshot.empty) showGuide("검색한 투수 정보를 찾을 수 없습니다.");
        else renderPitcher(snapshot.docs[0].data());
      } catch (error) {
        console.error("투수 검색 실패:", error);
        showGuide("검색 중 오류가 발생했습니다.");
      }
    }

    searchBtn.addEventListener("click", searchPitcher);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); searchPitcher(); }
    });
    onAuthStateChanged(auth, () => bindPitcherNamesRealtime());
  </script>
</body>
</html>
