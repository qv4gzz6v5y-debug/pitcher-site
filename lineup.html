<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>라인업</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .lineup-wrap {
      width: 95%;
      max-width: 1100px;
      margin: 34px auto;
    }

    .lineup-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .lineup-card h2 {
      margin-top: 0;
      font-size: 34px;
    }

    .lineup-input {
      width: 100%;
      padding: 12px 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .view-box {
      background: #f8f8f8;
      padding: 16px;
      border-radius: 14px;
      margin-top: 14px;
    }

    .view-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }

    .view-row:last-child {
      border-bottom: none;
    }

    .view-left {
      min-width: 50px;
      font-weight: 700;
    }

    .view-mid {
      flex: 1;
    }

    .view-right {
      min-width: 90px;
      text-align: right;
      color: #555;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="index.html">메인으로</a>
    </div>

    <div class="menu">
      <a href="roster.html">로스터</a>
      <a href="pitchers.html">투수 정보</a>
      <a href="lineup.html">라인업</a>
      <a href="record.html">기록실</a>
      <a href="mypage.html">마이페이지</a>
      <a id="adminMenu" class="hidden" href="admin.html">관리자</a>
    </div>
  </div>

  <div class="lineup-wrap">
    <div class="lineup-card">
      <h2>라인업</h2>

      <label for="gameDate">날짜</label>
      <input id="gameDate" type="date" class="lineup-input">

      <div id="viewBox" class="view-box">불러오는 중...</div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const user = JSON.parse(sessionStorage.getItem("currentUser"));
    if (user && (user.role === "super_admin" || user.role === "admin" || user.role === "scorer")) {
      document.getElementById("adminMenu").classList.remove("hidden");
    }

    const gameDate = document.getElementById("gameDate");
    const viewBox = document.getElementById("viewBox");

    function getDefaultDate() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function renderView(data) {
      if (!data || !data.players || data.players.length === 0) {
        viewBox.innerHTML = "저장된 라인업이 없습니다.";
        return;
      }

      let html = `
        <div class="view-row">
          <div class="view-left">SP</div>
          <div class="view-mid">${data.pitcher || "-"}</div>
          <div class="view-right">선발투수</div>
        </div>
      `;

      data.players.forEach(player => {
        const batting = player.batting ? ` (${player.batting})` : "";
        html += `
          <div class="view-row">
            <div class="view-left">${player.order}</div>
            <div class="view-mid">${player.name || "-"}${batting}</div>
            <div class="view-right">${player.position || "-"}</div>
          </div>
        `;
      });

      viewBox.innerHTML = html;
    }

    async function loadLineup() {
      const dateStr = gameDate.value;
      if (!dateStr) return;

      const snap = await getDoc(doc(db, "lineups", dateStr));
      if (snap.exists()) renderView(snap.data());
      else renderView(null);
    }

    gameDate.value = getDefaultDate();
    gameDate.addEventListener("change", loadLineup);
    loadLineup();
  </script>
</body>
</html>
