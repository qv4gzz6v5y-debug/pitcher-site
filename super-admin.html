<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비공개 관리 페이지</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="section">
    <h2>비공개 관리 페이지</h2>
    <div class="panel">
      <p>이 페이지는 최고관리자만 볼 수 있어.</p>
      <button class="small-btn" onclick="location.href='index.html'">메인으로</button>
    </div>

    <div class="panel">
      <h3>회원가입 대기 명단</h3>
      <div id="pendingList"></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      query,
      where,
      onSnapshot,
      updateDoc,
      deleteDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
    const pendingList = document.getElementById("pendingList");

    if (!currentUser || currentUser.role !== "super_admin") {
      alert("접근 권한이 없어.");
      location.href = "index.html";
    }

    function renderPending(users) {
      pendingList.innerHTML = "";

      if (users.length === 0) {
        pendingList.innerHTML = "<p>대기 중인 회원이 없어.</p>";
        return;
      }

      users.forEach((user) => {
        const row = document.createElement("div");
        row.className = "user-row";
        row.innerHTML = `
          <p><strong>마크닉:</strong> ${user.mcNick}</p>
          <p><strong>디스코드 태그:</strong> ${user.discordTag}</p>

          <input class="inline-input" id="rosterNick-${user.id}" placeholder="마크닉 입력" value="${user.mcNick}">
          <input class="inline-input" id="backNumber-${user.id}" placeholder="등번호 입력">

          <label class="inline-check">
            <input type="checkbox" id="admin-${user.id}"> 관리자 역할
          </label>

          <label class="inline-check">
            <input type="checkbox" id="scorer-${user.id}"> 기록원 역할
          </label>

          <br>
          <button class="small-btn approve-btn" data-id="${user.id}">승인</button>
          <button class="small-btn red reject-btn" data-id="${user.id}">거절</button>
        `;
        pendingList.appendChild(row);
      });

      document.querySelectorAll(".approve-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const rosterNick = document.getElementById(`rosterNick-${id}`).value.trim();
          const backNumber = document.getElementById(`backNumber-${id}`).value.trim();
          const isAdmin = document.getElementById(`admin-${id}`).checked;
          const isScorer = document.getElementById(`scorer-${id}`).checked;

          let role = "member";
          if (isAdmin) role = "admin";
          else if (isScorer) role = "scorer";

          btn.disabled = true;
          btn.textContent = "승인 중...";

          try {
            await updateDoc(doc(db, "users", id), {
              approved: true,
              rosterNick,
              backNumber,
              role
            });
            alert("승인 완료!");
          } catch (error) {
            console.error(error);
            alert("승인 중 오류가 발생했어.");
            btn.disabled = false;
            btn.textContent = "승인";
          }
        });
      });

      document.querySelectorAll(".reject-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;

          if (!confirm("이 가입 신청을 거절할까?")) return;

          btn.disabled = true;
          btn.textContent = "거절 중...";

          try {
            await deleteDoc(doc(db, "users", id));
            alert("거절 완료!");
          } catch (error) {
            console.error(error);
            alert("거절 중 오류가 발생했어.");
            btn.disabled = false;
            btn.textContent = "거절";
          }
        });
      });
    }

    const q = query(collection(db, "users"), where("approved", "==", false));

    onSnapshot(q, (snap) => {
      const users = [];
      snap.forEach((d) => {
        users.push({ id: d.id, ...d.data() });
      });
      renderPending(users);
    });
  </script>
</body>
</html>
