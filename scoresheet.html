<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기록지</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .sheet-wrap {
      width: 95%;
      max-width: 1200px;
      margin: 34px auto;
    }

    .sheet-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    .card-title {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .sheet-note {
      color: #666;
      font-size: 15px;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .sheet-input,
    .sheet-select,
    .sheet-textarea {
      width: 100%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
      background: #fff;
    }

    .sheet-textarea {
      min-height: 120px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.6;
    }

    .sheet-btn {
      padding: 11px 18px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 12px;
      font-size: 15px;
    }

    .sheet-btn.sub {
      background: #666;
    }

    .sheet-btn.delete {
      background: #b00020;
    }

    .sheet-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .sheet-box {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      border-left: 6px solid #1b65ba;
    }

    .sheet-top {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .sheet-score {
      font-size: 18px;
      margin-bottom: 14px;
      white-space: pre-line;
      line-height: 1.7;
    }

    .sheet-section-title {
      font-size: 20px;
      font-weight: 700;
      margin-top: 14px;
      margin-bottom: 8px;
    }

    .sheet-section-text {
      white-space: pre-line;
      line-height: 1.7;
      font-size: 16px;
    }

    .sheet-actions {
      margin-top: 14px;
    }

    .empty-text {
      color: #666;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="index.html">메인으로</a>
    </div>

    <div class="menu">
      <a href="roster.html">로스터</a>
      <a href="pitchers.html">투수 정보</a>
      <a href="lineup.html">라인업</a>
      <a href="record.html">기록실</a>
      <a href="scoresheet.html">기록지</a>
      <a href="mypage.html">마이페이지</a>
    </div>
  </div>

  <div class="sheet-wrap">

    <div class="sheet-card">
      <div class="card-title">기록지</div>
    </div>

    <div id="editCard" class="sheet-card hidden">
      <div class="card-title">기록지 작성 / 수정</div>

      <div class="sheet-grid">
        <div>
          <label for="gameDate">경기 날짜</label>
          <input id="gameDate" class="sheet-input" placeholder="예: 2026/4/2 (목)">
        </div>

        <div>
          <label for="gameTime">경기 시간</label>
          <input id="gameTime" class="sheet-input" placeholder="예: 20시">
        </div>

        <div>
          <label for="opponent">상대팀</label>
          <input id="opponent" class="sheet-input" placeholder="예: 오버드라이브">
        </div>

        <div>
          <label for="homeAway">홈 / 원정</label>
          <select id="homeAway" class="sheet-select">
            <option value="">선택</option>
            <option value="홈">홈</option>
            <option value="원정">원정</option>
          </select>
        </div>

        <div>
          <label for="finalScore">최종 스코어</label>
          <input id="finalScore" class="sheet-input" placeholder="예: 5:2">
        </div>

        <div>
          <label for="gameResult">결과</label>
          <select id="gameResult" class="sheet-select">
            <option value="">선택</option>
            <option value="승리">승리</option>
            <option value="패배">패배</option>
            <option value="무승부">무승부</option>
          </select>
        </div>
      </div>

      <label for="inningHeader">이닝 표시</label>
      <textarea id="inningHeader" class="sheet-textarea" placeholder="예:
1 2 3 4 5 6 7 8 9
--------------------"></textarea>

      <label for="inningAway">상대팀 점수줄</label>
      <textarea id="inningAway" class="sheet-textarea" placeholder="예:
0 2 0 2 0 0 1 0 0"></textarea>

      <label for="inningHome">우리팀 점수줄</label>
      <textarea id="inningHome" class="sheet-textarea" placeholder="예:
1 0 0 0 0 0 0 0 0"></textarea>

      <label for="battingRecord">타자 기록</label>
      <textarea id="battingRecord" class="sheet-textarea" placeholder="예:
1. SJ_Chicken CF,RP,CF / 1점홈런(1타점1득점) 뜬공 2루타(1타점) 뜬공 안타
2. DiceIm SS / 안타 2루타 뜬공
-> FlaneY2111 PH,RP / 삼진 뜬공"></textarea>

      <label for="pitchingRecord">투수 기록</label>
      <textarea id="pitchingRecord" class="sheet-textarea" placeholder="예:
ANG_JJam(패) / 6이닝 4실점 1자책 5피안타 0피홈런 6탈삼진 0사사구
Hyojung_0501 / 1이닝 1실점 0자책 1피안타 0피홈런 2탈삼진 0사사구"></textarea>

      <button id="saveBtn" class="sheet-btn">저장</button>
      <button id="resetBtn" class="sheet-btn sub">초기화</button>
    </div>

    <div class="sheet-card">
      <div class="card-title">저장된 기록지</div>
      <div id="sheetList">
        <p class="empty-text">기록지를 불러오는 중...</p>
      </div>
    </div>

  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      setDoc,
      doc,
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));

    function isStaff(user) {
      if (!user) return false;
      return user.role === "super_admin" || user.role === "admin" || user.role === "scorer";
    }

    const editCard = document.getElementById("editCard");
    if (isStaff(currentUser)) {
      editCard.classList.remove("hidden");
    } else {
      alert("접근 권한이 없습니다.");
      location.href = "record.html";
    }

    const gameDateInput = document.getElementById("gameDate");
    const gameTimeInput = document.getElementById("gameTime");
    const opponentInput = document.getElementById("opponent");
    const homeAwayInput = document.getElementById("homeAway");
    const finalScoreInput = document.getElementById("finalScore");
    const gameResultInput = document.getElementById("gameResult");
    const inningHeaderInput = document.getElementById("inningHeader");
    const inningAwayInput = document.getElementById("inningAway");
    const inningHomeInput = document.getElementById("inningHome");
    const battingRecordInput = document.getElementById("battingRecord");
    const pitchingRecordInput = document.getElementById("pitchingRecord");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const sheetList = document.getElementById("sheetList");

    let currentEditId = null;
    let sheets = [];

    function resetForm() {
      currentEditId = null;
      gameDateInput.value = "";
      gameTimeInput.value = "";
      opponentInput.value = "";
      homeAwayInput.value = "";
      finalScoreInput.value = "";
      gameResultInput.value = "";
      inningHeaderInput.value = "";
      inningAwayInput.value = "";
      inningHomeInput.value = "";
      battingRecordInput.value = "";
      pitchingRecordInput.value = "";
      saveBtn.textContent = "저장";
    }

    function parseBattingRecord(text) {
      const lines = text
        .split("\n")
        .map(v => v.trim())
        .filter(Boolean);

      const result = [];
      let currentMain = null;

      for (const line of lines) {
        if (/^\d+\./.test(line)) {
          const match = line.match(/^(\d+)\.\s+(.+?)\s+([^/]+)\s*\/\s*(.+)$/);
          if (match) {
            currentMain = {
              order: Number(match[1]),
              name: match[2].trim(),
              positions: match[3].split(",").map(v => v.trim()).filter(Boolean),
              plays: match[4].trim()
            };
            result.push(currentMain);
          } else {
            currentMain = {
              order: null,
              name: line,
              positions: [],
              plays: ""
            };
            result.push(currentMain);
          }
        } else if (line.startsWith("->")) {
          const sub = line.replace("->", "").trim();
          const match = sub.match(/^(.+?)\s+([^/]+)\s*\/\s*(.+)$/);
          if (match) {
            result.push({
              order: currentMain ? currentMain.order : null,
              substitute: true,
              name: match[1].trim(),
              positions: match[2].split(",").map(v => v.trim()).filter(Boolean),
              plays: match[3].trim()
            });
          } else {
            result.push({
              order: currentMain ? currentMain.order : null,
              substitute: true,
              name: sub,
              positions: [],
              plays: ""
            });
          }
        }
      }

      return result;
    }

    function parsePitchingRecord(text) {
      const lines = text
        .split("\n")
        .map(v => v.trim())
        .filter(Boolean);

      const result = [];

      for (const line of lines) {
        const [left, right] = line.split("/").map(v => v.trim());

        if (!left || !right) continue;

        const leftMatch = left.match(/^(.+?)(?:\((.+?)\))?$/);

        result.push({
          name: leftMatch ? leftMatch[1].trim() : left,
          decision: leftMatch && leftMatch[2] ? leftMatch[2].trim() : "",
          summary: right
        });
      }

      return result;
    }

    function buildRecordSummary(data) {
      return `${data.homeAway || "-"} ${data.finalScore || "-"} ${data.gameResult || "-"}`;
    }

    function renderSheets() {
      sheetList.innerHTML = "";

      if (sheets.length === 0) {
        sheetList.innerHTML = `<p class="empty-text">아직 저장된 기록지가 없습니다.</p>`;
        return;
      }

      sheets.forEach((sheet) => {
        const box = document.createElement("div");
        box.className = "sheet-box";

        box.innerHTML = `
          <div class="sheet-top">${sheet.gameDate || "-"}  ${sheet.gameTime || ""} vs ${sheet.opponent || "-"}
(${sheet.homeAway || "-"}) ${sheet.finalScore || "-"} ${sheet.gameResult || "-"}</div>

          <div class="sheet-score">${sheet.inningHeader || ""}\n${sheet.inningAway || ""}\n${sheet.inningHome || ""}</div>

          <div class="sheet-section-title">타자 기록</div>
          <div class="sheet-section-text">${sheet.battingRecord || "-"}</div>

          <div class="sheet-section-title">투수 기록</div>
          <div class="sheet-section-text">${sheet.pitchingRecord || "-"}</div>

          <div class="sheet-actions">
            <button class="sheet-btn" onclick="window.editSheet('${sheet.id}')">수정</button>
            <button class="sheet-btn delete" onclick="window.deleteSheet('${sheet.id}')">삭제</button>
          </div>
        `;

        sheetList.appendChild(box);
      });
    }

    async function syncRecordSummary(sheetId, data) {
      await setDoc(doc(db, "records", sheetId), {
        date: data.gameDate,
        opponent: data.opponent,
        result: data.gameResult === "승리" ? "승" : data.gameResult === "패배" ? "패" : "무",
        score: data.finalScore,
        memo: buildRecordSummary(data),
        updatedAt: Date.now(),
        createdAt: data.createdAt
      });
    }

    async function saveSheet() {
      const rawData = {
        gameDate: gameDateInput.value.trim(),
        gameTime: gameTimeInput.value.trim(),
        opponent: opponentInput.value.trim(),
        homeAway: homeAwayInput.value,
        finalScore: finalScoreInput.value.trim(),
        gameResult: gameResultInput.value,
        inningHeader: inningHeaderInput.value.trim(),
        inningAway: inningAwayInput.value.trim(),
        inningHome: inningHomeInput.value.trim(),
        battingRecord: battingRecordInput.value.trim(),
        pitchingRecord: pitchingRecordInput.value.trim()
      };

      if (!rawData.gameDate || !rawData.opponent || !rawData.finalScore || !rawData.gameResult) {
        alert("경기 날짜, 상대팀, 최종 스코어, 결과는 꼭 입력해줘.");
        return;
      }

      const parsedBatters = parseBattingRecord(rawData.battingRecord);
      const parsedPitchers = parsePitchingRecord(rawData.pitchingRecord);

      const now = Date.now();

      const saveData = {
        ...rawData,
        batters: parsedBatters,
        pitchers: parsedPitchers,
        updatedAt: now
      };

      saveBtn.disabled = true;
      saveBtn.textContent = currentEditId ? "수정 중..." : "저장 중...";

      try {
        if (currentEditId) {
          await updateDoc(doc(db, "scoresheets", currentEditId), saveData);
          await syncRecordSummary(currentEditId, {
            ...saveData,
            createdAt: now
          });
          alert("기록지 수정 완료!");
        } else {
          const added = await addDoc(collection(db, "scoresheets"), {
            ...saveData,
            createdAt: now
          });

          await syncRecordSummary(added.id, {
            ...saveData,
            createdAt: now
          });

          alert("기록지 저장 완료!");
        }

        resetForm();
      } catch (error) {
        console.error(error);
        alert("기록지 저장 중 오류가 발생했습니다.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "저장";
      }
    }

    function editSheet(id) {
      const target = sheets.find(s => s.id === id);
      if (!target) return;

      currentEditId = id;
      gameDateInput.value = target.gameDate || "";
      gameTimeInput.value = target.gameTime || "";
      opponentInput.value = target.opponent || "";
      homeAwayInput.value = target.homeAway || "";
      finalScoreInput.value = target.finalScore || "";
      gameResultInput.value = target.gameResult || "";
      inningHeaderInput.value = target.inningHeader || "";
      inningAwayInput.value = target.inningAway || "";
      inningHomeInput.value = target.inningHome || "";
      battingRecordInput.value = target.battingRecord || "";
      pitchingRecordInput.value = target.pitchingRecord || "";

      saveBtn.textContent = "수정 저장";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteSheet(id) {
      const ok = confirm("이 기록지를 삭제할까요?");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "scoresheets", id));
        await deleteDoc(doc(db, "records", id));
        alert("기록지 삭제 완료!");
        if (currentEditId === id) resetForm();
      } catch (error) {
        console.error(error);
        alert("기록지 삭제 중 오류가 발생했습니다.");
      }
    }

    window.editSheet = editSheet;
    window.deleteSheet = deleteSheet;

    saveBtn.addEventListener("click", saveSheet);
    resetBtn.addEventListener("click", resetForm);

    const sheetQuery = query(collection(db, "scoresheets"), orderBy("createdAt", "desc"));

    onSnapshot(sheetQuery, (snapshot) => {
      sheets = [];
      snapshot.forEach((docu) => {
        sheets.push({
          id: docu.id,
          ...docu.data()
        });
      });
      renderSheets();
    }, (error) => {
      console.error(error);
      sheetList.innerHTML = `<p class="empty-text">기록지를 불러오지 못했습니다.</p>`;
    });
  </script>

</body>
</html>
