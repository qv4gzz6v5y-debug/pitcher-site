<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기록지</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .sheet-wrap {
      width: 95%;
      max-width: 1300px;
      margin: 34px auto;
    }

    .sheet-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    .card-title {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .sheet-note {
      color: #666;
      font-size: 15px;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .sheet-input,
    .sheet-select,
    .cell-input {
      width: 100%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
      background: #fff;
    }

    .cell-input {
      margin: 0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }

    .sheet-btn {
      padding: 11px 18px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 12px;
      font-size: 15px;
    }

    .sheet-btn.sub {
      background: #666;
    }

    .sheet-btn.delete {
      background: #b00020;
    }

    .sheet-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .sheet-table-wrap {
      overflow-x: auto;
      margin-bottom: 18px;
    }

    .sheet-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 1000px;
    }

    .sheet-table th,
    .sheet-table td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }

    .sheet-table th {
      background: #f7f7f7;
      font-weight: 700;
      font-size: 14px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-top: 24px;
      margin-bottom: 10px;
    }

    .sheet-box {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      border-left: 6px solid #1b65ba;
    }

    .sheet-top {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .result-subtitle {
      font-size: 18px;
      font-weight: 700;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .empty-text {
      color: #666;
    }

    .hidden {
      display: none !important;
    }

    .stat-cell {
      background: #f9fafb;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="index.html">메인으로</a>
    </div>

    <div class="menu">
      <a href="roster.html">로스터</a>
      <a href="pitchers.html">투수 정보</a>
      <a href="lineup.html">라인업</a>
      <a href="record.html">기록실</a>
      <a href="scoresheet.html">기록지</a>
      <a href="mypage.html">마이페이지</a>
    </div>
  </div>

  <div class="sheet-wrap">

    <div class="sheet-card">
      <div class="card-title">기록지</div>
      <p class="sheet-note">날짜가 같은 라인업이 있으면 자동으로 불러와져.</p>
    </div>

    <div id="editCard" class="sheet-card hidden">
      <div class="card-title">기록지 작성 / 수정</div>

      <div class="sheet-grid">
        <div>
          <label for="gameDate">경기 날짜</label>
          <input id="gameDate" type="date" class="sheet-input">
        </div>

        <div>
          <label for="gameTime">경기 시간</label>
          <input id="gameTime" class="sheet-input" placeholder="예: 20시">
        </div>

        <div>
          <label for="opponent">상대팀</label>
          <input id="opponent" class="sheet-input" placeholder="예: 오버드라이브">
        </div>

        <div>
          <label for="homeAway">홈 / 원정</label>
          <select id="homeAway" class="sheet-select">
            <option value="">선택</option>
            <option value="홈">홈</option>
            <option value="원정">원정</option>
          </select>
        </div>

        <div>
          <label for="finalScore">최종 스코어</label>
          <input id="finalScore" class="sheet-input" placeholder="예: 5:2">
        </div>

        <div>
          <label for="gameResult">결과</label>
          <select id="gameResult" class="sheet-select">
            <option value="">선택</option>
            <option value="승리">승리</option>
            <option value="패배">패배</option>
            <option value="무승부">무승부</option>
          </select>
        </div>
      </div>

      <div class="section-title">이닝 점수</div>
      <div class="sheet-table-wrap">
        <table class="sheet-table">
          <thead>
            <tr>
              <th>팀</th>
              <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th>상대팀</th>
              <td><input id="away1" class="cell-input"></td>
              <td><input id="away2" class="cell-input"></td>
              <td><input id="away3" class="cell-input"></td>
              <td><input id="away4" class="cell-input"></td>
              <td><input id="away5" class="cell-input"></td>
              <td><input id="away6" class="cell-input"></td>
              <td><input id="away7" class="cell-input"></td>
              <td><input id="away8" class="cell-input"></td>
              <td><input id="away9" class="cell-input"></td>
            </tr>
            <tr>
              <th>우리팀</th>
              <td><input id="home1" class="cell-input"></td>
              <td><input id="home2" class="cell-input"></td>
              <td><input id="home3" class="cell-input"></td>
              <td><input id="home4" class="cell-input"></td>
              <td><input id="home5" class="cell-input"></td>
              <td><input id="home6" class="cell-input"></td>
              <td><input id="home7" class="cell-input"></td>
              <td><input id="home8" class="cell-input"></td>
              <td><input id="home9" class="cell-input"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="section-title">타자 기록</div>
      <div class="sheet-table-wrap">
        <table class="sheet-table">
          <thead>
            <tr>
              <th>타순</th>
              <th>선수명</th>
              <th>포지션</th>
              <th>타석</th>
              <th>기록 입력</th>
              <th>타수</th>
              <th>안타</th>
              <th>2루타</th>
              <th>3루타</th>
              <th>홈런</th>
              <th>타점</th>
              <th>득점</th>
              <th>삼진</th>
            </tr>
          </thead>
          <tbody id="battersBody"></tbody>
        </table>
      </div>

      <div class="section-title">투수 기록</div>
      <div class="sheet-table-wrap">
        <table class="sheet-table">
          <thead>
            <tr>
              <th>선수명</th>
              <th>결과</th>
              <th>이닝</th>
              <th>실점</th>
              <th>자책</th>
              <th>피안타</th>
              <th>피홈런</th>
              <th>탈삼진</th>
              <th>사사구</th>
              <th>ERA</th>
            </tr>
          </thead>
          <tbody id="pitchersBody"></tbody>
        </table>
      </div>

      <button id="saveBtn" class="sheet-btn">저장</button>
      <button id="resetBtn" class="sheet-btn sub">초기화</button>
    </div>

    <div class="sheet-card">
      <div class="card-title">저장된 기록지</div>
      <div id="sheetList">
        <p class="empty-text">기록지를 불러오는 중...</p>
      </div>
    </div>

  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      setDoc,
      doc,
      getDoc,
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));

    function isStaff(user) {
      return !!user && (user.role === "super_admin" || user.role === "admin" || user.role === "scorer");
    }

    const editCard = document.getElementById("editCard");
    if (isStaff(currentUser)) {
      editCard.classList.remove("hidden");
    } else {
      alert("접근 권한이 없어.");
      location.href = "record.html";
    }

    const gameDateInput = document.getElementById("gameDate");
    const gameTimeInput = document.getElementById("gameTime");
    const opponentInput = document.getElementById("opponent");
    const homeAwayInput = document.getElementById("homeAway");
    const finalScoreInput = document.getElementById("finalScore");
    const gameResultInput = document.getElementById("gameResult");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const sheetList = document.getElementById("sheetList");
    const battersBody = document.getElementById("battersBody");
    const pitchersBody = document.getElementById("pitchersBody");

    let currentEditId = null;
    let sheets = [];

    function getDefaultDate() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function createBattersRows() {
      battersBody.innerHTML = "";
      for (let i = 1; i <= 12; i++) {
        battersBody.innerHTML += `
          <tr>
            <td><input id="b_order_${i}" class="cell-input" value="${i <= 9 ? i : ""}"></td>
            <td><input id="b_name_${i}" class="cell-input"></td>
            <td><input id="b_pos_${i}" class="cell-input"></td>
            <td><input id="b_bat_${i}" class="cell-input" placeholder="우/좌/양"></td>
            <td><input id="b_record_${i}" class="cell-input" placeholder="예: 안타 삼진 2루타(1타점)"></td>
            <td class="stat-cell" id="b_ab_${i}">0</td>
            <td class="stat-cell" id="b_h_${i}">0</td>
            <td class="stat-cell" id="b_2b_${i}">0</td>
            <td class="stat-cell" id="b_3b_${i}">0</td>
            <td class="stat-cell" id="b_hr_${i}">0</td>
            <td class="stat-cell" id="b_rbi_${i}">0</td>
            <td class="stat-cell" id="b_r_${i}">0</td>
            <td class="stat-cell" id="b_so_${i}">0</td>
          </tr>
        `;
      }
    }

    function createPitchersRows() {
      pitchersBody.innerHTML = "";
      for (let i = 1; i <= 8; i++) {
        pitchersBody.innerHTML += `
          <tr>
            <td><input id="p_name_${i}" class="cell-input"></td>
            <td><input id="p_decision_${i}" class="cell-input" placeholder="승/패/세"></td>
            <td><input id="p_inning_${i}" class="cell-input" placeholder="예: 6, 1.2"></td>
            <td><input id="p_runs_${i}" class="cell-input"></td>
            <td><input id="p_er_${i}" class="cell-input"></td>
            <td><input id="p_hits_${i}" class="cell-input"></td>
            <td><input id="p_hr_${i}" class="cell-input"></td>
            <td><input id="p_so_${i}" class="cell-input"></td>
            <td><input id="p_bb_${i}" class="cell-input"></td>
            <td class="stat-cell" id="p_era_${i}">0.00</td>
          </tr>
        `;
      }
    }

    function attachAutoCalcEvents() {
      for (let i = 1; i <= 12; i++) {
        document.getElementById(`b_record_${i}`).addEventListener("input", () => {
          const stats = calculateBatterStats(document.getElementById(`b_record_${i}`).value);
          document.getElementById(`b_ab_${i}`).textContent = stats.ab;
          document.getElementById(`b_h_${i}`).textContent = stats.h;
          document.getElementById(`b_2b_${i}`).textContent = stats.double;
          document.getElementById(`b_3b_${i}`).textContent = stats.triple;
          document.getElementById(`b_hr_${i}`).textContent = stats.hr;
          document.getElementById(`b_rbi_${i}`).textContent = stats.rbi;
          document.getElementById(`b_r_${i}`).textContent = stats.r;
          document.getElementById(`b_so_${i}`).textContent = stats.so;
        });
      }

      for (let i = 1; i <= 8; i++) {
        ["p_inning_", "p_er_"].forEach(prefix => {
          document.getElementById(`${prefix}${i}`).addEventListener("input", () => {
            document.getElementById(`p_era_${i}`).textContent = calculateEra(
              document.getElementById(`p_inning_${i}`).value,
              document.getElementById(`p_er_${i}`).value
            );
          });
        });
      }
    }

    function calculateBatterStats(text) {
      const raw = String(text || "").trim();
      if (!raw) {
        return { ab: 0, h: 0, double: 0, triple: 0, hr: 0, rbi: 0, r: 0, so: 0 };
      }

      const count = (regex) => (raw.match(regex) || []).length;

      const hr = count(/홈런/g);
      const triple = count(/3루타/g);
      const double = count(/2루타/g);

      const hitOnly = count(/(?:^|[\s(])안타(?:[\s)]|$)/g);
      const single = Math.max(hitOnly - double - triple - hr, 0);
      const h = single + double + triple + hr;

      const so = count(/삼진/g);

      const outKeywords = count(/뜬공|땅볼|병살타|직선타|파울플라이|희생번트실패/g);
      const walkLike = count(/볼넷|사구|고의4구/g);
      const sf = count(/희생플라이/g);
      const sh = count(/희생번트/g);

      const ab = h + so + outKeywords;
      const rbiMatches = [...raw.matchAll(/(\d+)타점/g)];
      const rMatches = [...raw.matchAll(/(\d+)득점/g)];

      const rbi = rbiMatches.reduce((sum, m) => sum + Number(m[1]), 0);
      const r = rMatches.reduce((sum, m) => sum + Number(m[1]), 0);

      return { ab, h, double, triple, hr, rbi, r, so, walkLike, sf, sh };
    }

    function inningsToOuts(value) {
      const str = String(value || "").trim();
      if (!str) return 0;
      if (!str.includes(".")) return Number(str) * 3 || 0;
      const [whole, part] = str.split(".");
      const wholeNum = Number(whole) || 0;
      const partNum = Number(part) || 0;
      return wholeNum * 3 + partNum;
    }

    function calculateEra(inningValue, erValue) {
      const outs = inningsToOuts(inningValue);
      const er = Number(erValue || 0);
      if (!outs) return "0.00";
      const innings = outs / 3;
      const era = (er * 9) / innings;
      return era.toFixed(2);
    }

    function getInningRow(prefix) {
      const arr = [];
      for (let i = 1; i <= 9; i++) {
        arr.push(document.getElementById(`${prefix}${i}`).value.trim());
      }
      return arr;
    }

    function getBatters() {
      const arr = [];
      for (let i = 1; i <= 12; i++) {
        const recordText = document.getElementById(`b_record_${i}`).value.trim();
        const stats = calculateBatterStats(recordText);

        const item = {
          order: document.getElementById(`b_order_${i}`).value.trim(),
          name: document.getElementById(`b_name_${i}`).value.trim(),
          position: document.getElementById(`b_pos_${i}`).value.trim(),
          batting: document.getElementById(`b_bat_${i}`).value.trim(),
          record: recordText,
          stats: {
            ab: stats.ab,
            h: stats.h,
            double: stats.double,
            triple: stats.triple,
            hr: stats.hr,
            rbi: stats.rbi,
            r: stats.r,
            so: stats.so
          }
        };

        if (item.name || item.position || item.record) arr.push(item);
      }
      return arr;
    }

    function getPitchers() {
      const arr = [];
      for (let i = 1; i <= 8; i++) {
        const item = {
          name: document.getElementById(`p_name_${i}`).value.trim(),
          decision: document.getElementById(`p_decision_${i}`).value.trim(),
          inning: document.getElementById(`p_inning_${i}`).value.trim(),
          runs: document.getElementById(`p_runs_${i}`).value.trim(),
          er: document.getElementById(`p_er_${i}`).value.trim(),
          hits: document.getElementById(`p_hits_${i}`).value.trim(),
          hr: document.getElementById(`p_hr_${i}`).value.trim(),
          so: document.getElementById(`p_so_${i}`).value.trim(),
          bb: document.getElementById(`p_bb_${i}`).value.trim(),
          era: calculateEra(
            document.getElementById(`p_inning_${i}`).value.trim(),
            document.getElementById(`p_er_${i}`).value.trim()
          )
        };
        if (item.name) arr.push(item);
      }
      return arr;
    }

    function resetForm() {
      currentEditId = null;
      gameDateInput.value = getDefaultDate();
      gameTimeInput.value = "";
      opponentInput.value = "";
      homeAwayInput.value = "";
      finalScoreInput.value = "";
      gameResultInput.value = "";

      for (let i = 1; i <= 9; i++) {
        document.getElementById(`away${i}`).value = "";
        document.getElementById(`home${i}`).value = "";
      }

      createBattersRows();
      createPitchersRows();
      attachAutoCalcEvents();
      saveBtn.textContent = "저장";
    }

    function buildRecordSummary(data) {
      return `${data.homeAway || "-"} ${data.finalScore || "-"} ${data.gameResult || "-"}`;
    }

    async function loadLineupToSheet(dateStr) {
      if (!dateStr) return;

      const snap = await getDoc(doc(db, "lineups", dateStr));
      if (!snap.exists()) return;

      const lineup = snap.data();
      if (!lineup?.players) return;

      createBattersRows();
      attachAutoCalcEvents();

      lineup.players.forEach((player, idx) => {
        const i = idx + 1;
        if (i > 12) return;

        document.getElementById(`b_order_${i}`).value = player.order || "";
        document.getElementById(`b_name_${i}`).value = player.name || "";
        document.getElementById(`b_pos_${i}`).value = player.position || "";
        document.getElementById(`b_bat_${i}`).value = player.batting || "";
      });

      if (lineup.pitcher) {
        document.getElementById("p_name_1").value = lineup.pitcher;
      }
    }

    function renderSheets() {
      sheetList.innerHTML = "";

      if (sheets.length === 0) {
        sheetList.innerHTML = `<p class="empty-text">아직 저장된 기록지가 없습니다.</p>`;
        return;
      }

      sheets.forEach((sheet) => {
        const innings = sheet.innings || {
          header: ["1","2","3","4","5","6","7","8","9"],
          away: [],
          home: []
        };

        const box = document.createElement("div");
        box.className = "sheet-box";

        box.innerHTML = `
          <div class="sheet-top">${sheet.gameDate || "-"} ${sheet.gameTime || ""} vs ${sheet.opponent || "-"} (${sheet.homeAway || "-"}) ${sheet.finalScore || "-"} ${sheet.gameResult || "-"}</div>

          <div class="result-subtitle">이닝 점수</div>
          <div class="sheet-table-wrap">
            <table class="sheet-table">
              <thead>
                <tr>
                  <th>팀</th>
                  ${innings.header.map(v => `<th>${v}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th>상대팀</th>
                  ${innings.away.map(v => `<td>${v || ""}</td>`).join("")}
                </tr>
                <tr>
                  <th>우리팀</th>
                  ${innings.home.map(v => `<td>${v || ""}</td>`).join("")}
                </tr>
              </tbody>
            </table>
          </div>

          <div class="result-subtitle">타자 기록</div>
          <div class="sheet-table-wrap">
            <table class="sheet-table">
              <thead>
                <tr>
                  <th>타순</th>
                  <th>선수명</th>
                  <th>포지션</th>
                  <th>타석</th>
                  <th>기록</th>
                  <th>타수</th>
                  <th>안타</th>
                  <th>2루타</th>
                  <th>3루타</th>
                  <th>홈런</th>
                  <th>타점</th>
                  <th>득점</th>
                  <th>삼진</th>
                </tr>
              </thead>
              <tbody>
                ${(sheet.batters || []).map(b => `
                  <tr>
                    <td>${b.order || ""}</td>
                    <td>${b.name || ""}</td>
                    <td>${b.position || ""}</td>
                    <td>${b.batting || ""}</td>
                    <td>${b.record || ""}</td>
                    <td>${b.stats?.ab ?? 0}</td>
                    <td>${b.stats?.h ?? 0}</td>
                    <td>${b.stats?.double ?? 0}</td>
                    <td>${b.stats?.triple ?? 0}</td>
                    <td>${b.stats?.hr ?? 0}</td>
                    <td>${b.stats?.rbi ?? 0}</td>
                    <td>${b.stats?.r ?? 0}</td>
                    <td>${b.stats?.so ?? 0}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>

          <div class="result-subtitle">투수 기록</div>
          <div class="sheet-table-wrap">
            <table class="sheet-table">
              <thead>
                <tr>
                  <th>선수명</th>
                  <th>결과</th>
                  <th>이닝</th>
                  <th>실점</th>
                  <th>자책</th>
                  <th>피안타</th>
                  <th>피홈런</th>
                  <th>탈삼진</th>
                  <th>사사구</th>
                  <th>ERA</th>
                </tr>
              </thead>
              <tbody>
                ${(sheet.pitchers || []).map(p => `
                  <tr>
                    <td>${p.name || ""}</td>
                    <td>${p.decision || ""}</td>
                    <td>${p.inning || ""}</td>
                    <td>${p.runs || ""}</td>
                    <td>${p.er || ""}</td>
                    <td>${p.hits || ""}</td>
                    <td>${p.hr || ""}</td>
                    <td>${p.so || ""}</td>
                    <td>${p.bb || ""}</td>
                    <td>${p.era || "0.00"}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>

          <div class="sheet-actions">
            <button class="sheet-btn" onclick="window.editSheet('${sheet.id}')">수정</button>
            <button class="sheet-btn delete" onclick="window.deleteSheet('${sheet.id}')">삭제</button>
          </div>
        `;

        sheetList.appendChild(box);
      });
    }

    async function syncRecordSummary(sheetId, data) {
      await setDoc(doc(db, "records", sheetId), {
        date: data.gameDate,
        opponent: data.opponent,
        result: data.gameResult === "승리" ? "승" : data.gameResult === "패배" ? "패" : "무",
        score: data.finalScore,
        memo: buildRecordSummary(data),
        updatedAt: Date.now(),
        createdAt: data.createdAt
      });
    }

    async function saveSheet() {
      const now = Date.now();

      const data = {
        gameDate: gameDateInput.value.trim(),
        gameTime: gameTimeInput.value.trim(),
        opponent: opponentInput.value.trim(),
        homeAway: homeAwayInput.value,
        finalScore: finalScoreInput.value.trim(),
        gameResult: gameResultInput.value,
        innings: {
          header: ["1","2","3","4","5","6","7","8","9"],
          away: getInningRow("away"),
          home: getInningRow("home")
        },
        batters: getBatters(),
        pitchers: getPitchers(),
        updatedAt: now
      };

      if (!data.gameDate || !data.opponent || !data.finalScore || !data.gameResult) {
        alert("경기 날짜, 상대팀, 최종 스코어, 결과는 꼭 입력해주세요.");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = currentEditId ? "수정 중..." : "저장 중...";

      try {
        if (currentEditId) {
          await updateDoc(doc(db, "scoresheets", currentEditId), data);
          await syncRecordSummary(currentEditId, { ...data, createdAt: now });
          alert("기록지 수정 완료!");
        } else {
          const added = await addDoc(collection(db, "scoresheets"), {
            ...data,
            createdAt: now
          });
          await syncRecordSummary(added.id, { ...data, createdAt: now });
          alert("기록지 저장 완료!");
        }

        resetForm();
      } catch (error) {
        console.error(error);
        alert("기록지 저장 중 오류가 발생했습니다.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "저장";
      }
    }

    function fillForm(sheet) {
      gameDateInput.value = sheet.gameDate || "";
      gameTimeInput.value = sheet.gameTime || "";
      opponentInput.value = sheet.opponent || "";
      homeAwayInput.value = sheet.homeAway || "";
      finalScoreInput.value = sheet.finalScore || "";
      gameResultInput.value = sheet.gameResult || "";

      const away = sheet.innings?.away || [];
      const home = sheet.innings?.home || [];

      for (let i = 1; i <= 9; i++) {
        document.getElementById(`away${i}`).value = away[i - 1] || "";
        document.getElementById(`home${i}`).value = home[i - 1] || "";
      }

      createBattersRows();
      createPitchersRows();
      attachAutoCalcEvents();

      (sheet.batters || []).forEach((b, idx) => {
        const i = idx + 1;
        if (i > 12) return;
        document.getElementById(`b_order_${i}`).value = b.order || "";
        document.getElementById(`b_name_${i}`).value = b.name || "";
        document.getElementById(`b_pos_${i}`).value = b.position || "";
        document.getElementById(`b_bat_${i}`).value = b.batting || "";
        document.getElementById(`b_record_${i}`).value = b.record || "";
        document.getElementById(`b_ab_${i}`).textContent = b.stats?.ab ?? 0;
        document.getElementById(`b_h_${i}`).textContent = b.stats?.h ?? 0;
        document.getElementById(`b_2b_${i}`).textContent = b.stats?.double ?? 0;
        document.getElementById(`b_3b_${i}`).textContent = b.stats?.triple ?? 0;
        document.getElementById(`b_hr_${i}`).textContent = b.stats?.hr ?? 0;
        document.getElementById(`b_rbi_${i}`).textContent = b.stats?.rbi ?? 0;
        document.getElementById(`b_r_${i}`).textContent = b.stats?.r ?? 0;
        document.getElementById(`b_so_${i}`).textContent = b.stats?.so ?? 0;
      });

      (sheet.pitchers || []).forEach((p, idx) => {
        const i = idx + 1;
        if (i > 8) return;
        document.getElementById(`p_name_${i}`).value = p.name || "";
        document.getElementById(`p_decision_${i}`).value = p.decision || "";
        document.getElementById(`p_inning_${i}`).value = p.inning || "";
        document.getElementById(`p_runs_${i}`).value = p.runs || "";
        document.getElementById(`p_er_${i}`).value = p.er || "";
        document.getElementById(`p_hits_${i}`).value = p.hits || "";
        document.getElementById(`p_hr_${i}`).value = p.hr || "";
        document.getElementById(`p_so_${i}`).value = p.so || "";
        document.getElementById(`p_bb_${i}`).value = p.bb || "";
        document.getElementById(`p_era_${i}`).textContent = p.era || "0.00";
      });
    }

    function editSheet(id) {
      const target = sheets.find(s => s.id === id);
      if (!target) return;

      currentEditId = id;
      fillForm(target);
      saveBtn.textContent = "수정 저장";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteSheet(id) {
      const ok = confirm("이 기록지를 삭제할까요?");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "scoresheets", id));
        await deleteDoc(doc(db, "records", id));
        alert("기록지 삭제 완료!");
        if (currentEditId === id) resetForm();
      } catch (error) {
        console.error(error);
        alert("기록지 삭제 중 오류가 발생했습니다.");
      }
    }

    window.editSheet = editSheet;
    window.deleteSheet = deleteSheet;

    saveBtn.addEventListener("click", saveSheet);
    resetBtn.addEventListener("click", resetForm);

    gameDateInput.addEventListener("change", async () => {
      if (!currentEditId) {
        await loadLineupToSheet(gameDateInput.value);
      }
    });

    createBattersRows();
    createPitchersRows();
    attachAutoCalcEvents();
    gameDateInput.value = getDefaultDate();

    const sheetQuery = query(collection(db, "scoresheets"), orderBy("createdAt", "desc"));

    onSnapshot(sheetQuery, (snapshot) => {
      sheets = [];
      snapshot.forEach((docu) => {
        sheets.push({
          id: docu.id,
          ...docu.data()
        });
      });
      renderSheets();
    }, (error) => {
      console.error(error);
      sheetList.innerHTML = `<p class="empty-text">기록지를 불러오지 못했습니다</p>`;
    });

    loadLineupToSheet(gameDateInput.value);
  </script>

</body>
</html>
