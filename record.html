<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록실 | 레이 마린스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="top-title"><h1>레이 마린스</h1><a class="top-link" href="index.html">메인으로</a></header>
    <nav class="menu">
      <a href="roster.html">로스터</a>
      <a href="pitchers.html">투수 정보</a>
      <a href="lineup.html">라인업</a>
      <a href="record.html" class="active">기록실</a>
      <a href="scoresheet.html">기록지</a>
      <a href="mypage.html">마이페이지</a>
    </nav>
    <section class="main-box">
      <div><span class="badge">RECORDS</span><h2 class="main-box-title">기록실</h2><p class="main-box-desc">연습경기 기록과 리그 경기 기록을 분리해서 확인할 수 있어요.</p></div>
      <div class="toolbar">
        <div class="seg-group">
          <button class="seg-btn active" data-type="practice">연습경기 기록</button>
          <button class="seg-btn" data-type="league">리그 경기 기록</button>
        </div>
        <a id="sheetLink" class="top-link hidden" href="scoresheet.html">기록지로 이동</a>
      </div>
      <div id="recordList" class="list-stack" style="margin-top:22px;"><div class="item-card"><div class="empty-text">기록을 불러오는 중...</div></div></div>
    </section>
  </div>
  <script type="module">
    import { db } from "./firebase-config.js";
    import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
    if (currentUser && ["super_admin","admin","scorer"].includes(currentUser.role)) document.getElementById('sheetLink').classList.remove('hidden');
    const recordList = document.getElementById('recordList');
    const typeButtons = [...document.querySelectorAll('.seg-btn')];
    let currentType = 'practice';
    let allRecords = [];
    const typeLabel = (type) => type === 'league' ? '리그 경기' : '연습경기';
    const resultClass = (result) => result === '승' ? 'win' : result === '패' ? 'lose' : 'draw';
    function render() {
      const records = allRecords.filter(record => (record.gameType || 'league') === currentType);
      recordList.innerHTML = '';
      if (!records.length) {
        recordList.innerHTML = `<div class="item-card"><div class="empty-text">${typeLabel(currentType)} 기록이 아직 없습니다.</div></div>`;
        return;
      }
      records.forEach(record => {
        const box = document.createElement('div');
        box.className = 'item-card';
        box.innerHTML = `
          <div class="item-top">
            <div>
              <div class="item-title">${record.date || '-'}</div>
              <div class="item-meta">상대팀 ${record.opponent || '-'} · 스코어 ${record.score || '-'}</div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <span class="record-chip ${currentType === 'league' ? 'league' : 'practice'}">${typeLabel(currentType)}</span>
              <span class="record-chip ${resultClass(record.result || '')}">${record.result || '-'}</span>
            </div>
          </div>
          <div class="item-meta" style="margin-top:12px;">${record.memo || '메모 없음'}</div>
        `;
        recordList.appendChild(box);
      });
    }
    typeButtons.forEach(btn => btn.addEventListener('click', () => { currentType = btn.dataset.type; typeButtons.forEach(b => b.classList.toggle('active', b===btn)); render(); }));
    onSnapshot(query(collection(db, 'records'), orderBy('createdAt', 'desc')), snapshot => {
      allRecords = [];
      snapshot.forEach(docu => allRecords.push({id: docu.id, ...docu.data()}));
      render();
    }, error => {
      console.error(error);
      recordList.innerHTML = `<div class="item-card"><div class="empty-text">기록을 불러오지 못했습니다.</div></div>`;
    });
  </script>
</body>
</html>
