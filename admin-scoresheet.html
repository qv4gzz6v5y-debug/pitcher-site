<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기록지 관리</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .sheet-wrap {
      width: 95%;
      max-width: 1300px;
      margin: 34px auto;
    }

    .sheet-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    .card-title {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .sheet-note {
      color: #666;
      font-size: 15px;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .sheet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .sheet-input,
    .sheet-select,
    .cell-input {
      width: 100%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
      background: #fff;
    }

    .cell-input {
      margin: 0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      min-width: 52px;
    }

    .sheet-btn {
      padding: 11px 18px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 12px;
      font-size: 15px;
    }

    .sheet-btn.sub {
      background: #666;
    }

    .sheet-btn.delete {
      background: #b00020;
    }

    .sheet-btn.small {
      padding: 6px 10px;
      margin: 0;
      font-size: 12px;
      border-radius: 8px;
    }

    .sheet-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .sheet-table-wrap {
      overflow-x: auto;
      margin-bottom: 18px;
    }

    .sheet-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      min-width: 1100px;
    }

    .sheet-table th,
    .sheet-table td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }

    .sheet-table th {
      background: #f7f7f7;
      font-weight: 700;
      font-size: 14px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-top: 24px;
      margin-bottom: 10px;
    }

    .section-actions {
      margin-bottom: 10px;
    }

    .sheet-box {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      border-left: 6px solid #1b65ba;
    }

    .sheet-top {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .result-subtitle {
      font-size: 18px;
      font-weight: 700;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .empty-text {
      color: #666;
    }

    .stat-cell {
      background: #f9fafb;
      font-weight: 700;
    }

    .sub-row {
      background: #fcfcfc;
    }

    .inning-actions {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="admin.html">관리자 홈</a>
    </div>

    <div class="menu">
      <a href="admin.html">관리자 홈</a>
      <a href="admin-lineup.html">라인업 관리</a>
      <a href="admin-lineup-history.html">라인업 기록</a>
      <a href="admin-pitchers.html">투수 정보</a>
      <a href="admin-scoresheet.html" class="active">경기 기록</a>
      <a href="admin-record-history.html">기록 내역</a>
    </div>
  </div>

  <div class="sheet-wrap">

    <div class="sheet-card">
      <div class="card-title">경기 기록 관리</div>
      <p class="sheet-note">연습경기와 리그 경기 기록을 나눠 저장할 수 있어. 저장된 기록은 기록 내역 탭에 남고, 나중에 다시 수정할 수도 있어.</p>
    </div>

    <div class="sheet-card">
      <div class="card-title">기록지 작성 / 수정</div>
      <div class="toolbar" style="margin-bottom:16px;">
        <div class="seg-group">
          <button type="button" class="filter-chip active" data-filter="all">전체</button>
          <button type="button" class="filter-chip" data-filter="practice">연습경기</button>
          <button type="button" class="filter-chip" data-filter="league">리그 경기</button>
        </div>
      </div>

      <div class="sheet-grid">
        <div>
          <label for="gameDate">경기 날짜</label>
          <input id="gameDate" type="date" class="sheet-input">
        </div>

        <div>
          <label for="gameType">경기 종류</label>
          <select id="gameType" class="sheet-select">
            <option value="practice">연습경기</option>
            <option value="league">리그 경기</option>
          </select>
        </div>

        <div>
          <label for="gameTime">경기 시간</label>
          <input id="gameTime" class="sheet-input" placeholder="예: 20시">
        </div>

        <div>
          <label for="opponent">상대팀</label>
          <input id="opponent" class="sheet-input" placeholder="예: 오버드라이브">
        </div>

        <div>
          <label for="homeAway">홈 / 원정</label>
          <select id="homeAway" class="sheet-select">
            <option value="">선택</option>
            <option value="홈">홈</option>
            <option value="원정">원정</option>
          </select>
        </div>

        <div>
          <label for="finalScore">최종 스코어</label>
          <input id="finalScore" class="sheet-input" placeholder="예: 5:2">
        </div>

        <div>
          <label for="gameResult">결과</label>
          <select id="gameResult" class="sheet-select">
            <option value="">선택</option>
            <option value="승리">승리</option>
            <option value="패배">패배</option>
            <option value="무승부">무승부</option>
          </select>
        </div>
      </div>

      <div class="section-title">이닝 점수</div>
      <div class="inning-actions">
        <button type="button" id="addInningBtn" class="sheet-btn sub">연장 이닝 추가</button>
        <button type="button" id="removeInningBtn" class="sheet-btn sub">마지막 이닝 삭제</button>
      </div>
      <div class="sheet-table-wrap">
        <table class="sheet-table">
          <thead id="inningHead"></thead>
          <tbody id="inningBody"></tbody>
        </table>
      </div>

      <div class="section-title">타자 기록</div>
      <div class="sheet-table-wrap">
        <table class="sheet-table">
          <thead>
            <tr>
              <th>타순</th>
              <th>선수명</th>
              <th>포지션</th>
              <th>기록 입력</th>
              <th>타수</th>
              <th>안타</th>
              <th>2루타</th>
              <th>3루타</th>
              <th>홈런</th>
              <th>타점</th>
              <th>득점</th>
              <th>삼진</th>
              <th>기능</th>
            </tr>
          </thead>
          <tbody id="battersBody"></tbody>
        </table>
      </div>

      <div class="section-title">투수 기록</div>
      <div class="section-actions">
        <button type="button" id="addPitcherBtn" class="sheet-btn sub">투수 추가</button>
      </div>
      <div class="sheet-table-wrap">
        <table class="sheet-table">
          <thead>
            <tr>
              <th>선수명</th>
              <th>결과</th>
              <th>이닝</th>
              <th>실점</th>
              <th>자책</th>
              <th>피안타</th>
              <th>피홈런</th>
              <th>탈삼진</th>
              <th>사사구</th>
              <th>ERA</th>
              <th>기능</th>
            </tr>
          </thead>
          <tbody id="pitchersBody"></tbody>
        </table>
      </div>

      <button id="saveBtn" class="sheet-btn">저장</button>
      <button id="resetBtn" class="sheet-btn sub">초기화</button>
    </div>

    <div class="sheet-card">
      <div class="card-title">저장된 기록지</div>
      <div id="sheetList">
        <p class="empty-text">기록지를 불러오는 중...</p>
      </div>
    </div>

  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      setDoc,
      doc,
      getDoc,
      onSnapshot,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
    const isStaff = currentUser && (
      currentUser.role === "super_admin" ||
      currentUser.role === "admin" ||
      currentUser.role === "scorer"
    );

    if (!isStaff) {
      alert("접근 권한이 없어.");
      location.href = "index.html";
    }

    const gameDateInput = document.getElementById("gameDate");
    const gameTypeInput = document.getElementById("gameType");
    const gameTimeInput = document.getElementById("gameTime");
    const opponentInput = document.getElementById("opponent");
    const homeAwayInput = document.getElementById("homeAway");
    const finalScoreInput = document.getElementById("finalScore");
    const gameResultInput = document.getElementById("gameResult");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const addInningBtn = document.getElementById("addInningBtn");
    const removeInningBtn = document.getElementById("removeInningBtn");
    const addPitcherBtn = document.getElementById("addPitcherBtn");
    const sheetList = document.getElementById("sheetList");
    const filterButtons = [...document.querySelectorAll(".filter-chip")];
    const battersBody = document.getElementById("battersBody");
    const pitchersBody = document.getElementById("pitchersBody");
    const inningHead = document.getElementById("inningHead");
    const inningBody = document.getElementById("inningBody");

    let currentEditId = null;
    let sheets = [];
    let batterRowCounter = 0;
    let pitcherRowCounter = 0;
    let inningCount = 9;
    let currentFilter = "all";
    const initialEditId = new URLSearchParams(location.search).get("edit");

    function getDefaultDate() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function renderInningTable(awayValues = [], homeValues = []) {
      let headHtml = `<tr><th>팀</th>`;
      for (let i = 1; i <= inningCount; i++) {
        headHtml += `<th>${i}</th>`;
      }
      headHtml += `</tr>`;
      inningHead.innerHTML = headHtml;

      let awayHtml = `<tr><th>상대팀</th>`;
      let homeHtml = `<tr><th>우리팀</th>`;

      for (let i = 1; i <= inningCount; i++) {
        awayHtml += `<td><input id="away${i}" class="cell-input" value="${awayValues[i - 1] || ""}"></td>`;
        homeHtml += `<td><input id="home${i}" class="cell-input" value="${homeValues[i - 1] || ""}"></td>`;
      }

      awayHtml += `</tr>`;
      homeHtml += `</tr>`;
      inningBody.innerHTML = awayHtml + homeHtml;
    }

    function calculateBatterStats(text) {
      const raw = String(text || "").trim();
      if (!raw) {
        return { ab: 0, h: 0, double: 0, triple: 0, hr: 0, rbi: 0, r: 0, so: 0 };
      }

      const count = (regex) => (raw.match(regex) || []).length;

      const hr = count(/홈런/g);
      const triple = count(/3루타/g);
      const double = count(/2루타/g);
      const hitOnly = count(/(?:^|[\s(])안타(?:[\s)]|$)/g);
      const single = Math.max(hitOnly - double - triple - hr, 0);
      const h = single + double + triple + hr;
      const so = count(/삼진/g);
      const outKeywords = count(/뜬공|땅볼|병살타|직선타|파울플라이/g);
      const ab = h + so + outKeywords;

      const rbiMatches = [...raw.matchAll(/(\d+)타점/g)];
      const rMatches = [...raw.matchAll(/(\d+)득점/g)];

      const rbi = rbiMatches.reduce((sum, m) => sum + Number(m[1]), 0);
      const r = rMatches.reduce((sum, m) => sum + Number(m[1]), 0);

      return { ab, h, double, triple, hr, rbi, r, so };
    }

    function updateBatterStats(rowId) {
      const stats = calculateBatterStats(document.getElementById(`b_record_${rowId}`).value);
      document.getElementById(`b_ab_${rowId}`).textContent = stats.ab;
      document.getElementById(`b_h_${rowId}`).textContent = stats.h;
      document.getElementById(`b_2b_${rowId}`).textContent = stats.double;
      document.getElementById(`b_3b_${rowId}`).textContent = stats.triple;
      document.getElementById(`b_hr_${rowId}`).textContent = stats.hr;
      document.getElementById(`b_rbi_${rowId}`).textContent = stats.rbi;
      document.getElementById(`b_r_${rowId}`).textContent = stats.r;
      document.getElementById(`b_so_${rowId}`).textContent = stats.so;
    }

    function inningsToOuts(value) {
      const str = String(value || "").trim();
      if (!str) return 0;
      if (!str.includes(".")) return (Number(str) || 0) * 3;
      const [whole, part] = str.split(".");
      return (Number(whole) || 0) * 3 + (Number(part) || 0);
    }

    function calculateEra(inningValue, erValue) {
      const outs = inningsToOuts(inningValue);
      const er = Number(erValue || 0);
      if (!outs) return "0.00";
      const innings = outs / 3;
      return ((er * 9) / innings).toFixed(2);
    }

    function updatePitcherEra(rowId) {
      const era = calculateEra(
        document.getElementById(`p_inning_${rowId}`).value,
        document.getElementById(`p_er_${rowId}`).value
      );
      document.getElementById(`p_era_${rowId}`).textContent = era;
    }

    function createBatterRow(data = {}) {
      batterRowCounter += 1;
      const rowId = batterRowCounter;
      const row = document.createElement("tr");
      if (data.isSub) row.classList.add("sub-row");
      row.dataset.rowId = rowId;

      row.innerHTML = `
        <td><input id="b_order_${rowId}" class="cell-input" value="${data.order ?? ""}"></td>
        <td><input id="b_name_${rowId}" class="cell-input" value="${data.name ?? ""}"></td>
        <td><input id="b_pos_${rowId}" class="cell-input" value="${data.position ?? ""}"></td>
        <td><input id="b_record_${rowId}" class="cell-input" placeholder="예: 안타 삼진 2루타(1타점)" value="${data.record ?? ""}"></td>
        <td class="stat-cell" id="b_ab_${rowId}">0</td>
        <td class="stat-cell" id="b_h_${rowId}">0</td>
        <td class="stat-cell" id="b_2b_${rowId}">0</td>
        <td class="stat-cell" id="b_3b_${rowId}">0</td>
        <td class="stat-cell" id="b_hr_${rowId}">0</td>
        <td class="stat-cell" id="b_rbi_${rowId}">0</td>
        <td class="stat-cell" id="b_r_${rowId}">0</td>
        <td class="stat-cell" id="b_so_${rowId}">0</td>
        <td>
          <button type="button" class="sheet-btn small sub" onclick="window.addSubRow(${rowId})">교체 추가</button>
          <button type="button" class="sheet-btn small delete" onclick="window.removeBatterRow(${rowId})">삭제</button>
        </td>
      `;

      row.querySelector(`#b_record_${rowId}`).addEventListener("input", () => updateBatterStats(rowId));

      if (data.record) {
        setTimeout(() => updateBatterStats(rowId), 0);
      }

      return row;
    }

    function createPitcherRow(data = {}) {
      pitcherRowCounter += 1;
      const rowId = pitcherRowCounter;
      const row = document.createElement("tr");
      row.dataset.pitcherRowId = rowId;

      row.innerHTML = `
        <td><input id="p_name_${rowId}" class="cell-input" value="${data.name ?? ""}"></td>
        <td><input id="p_decision_${rowId}" class="cell-input" placeholder="승/패/세" value="${data.decision ?? ""}"></td>
        <td><input id="p_inning_${rowId}" class="cell-input" placeholder="예: 6, 1.2" value="${data.inning ?? ""}"></td>
        <td><input id="p_runs_${rowId}" class="cell-input" value="${data.runs ?? ""}"></td>
        <td><input id="p_er_${rowId}" class="cell-input" value="${data.er ?? ""}"></td>
        <td><input id="p_hits_${rowId}" class="cell-input" value="${data.hits ?? ""}"></td>
        <td><input id="p_hr_${rowId}" class="cell-input" value="${data.hr ?? ""}"></td>
        <td><input id="p_so_${rowId}" class="cell-input" value="${data.so ?? ""}"></td>
        <td><input id="p_bb_${rowId}" class="cell-input" value="${data.bb ?? ""}"></td>
        <td class="stat-cell" id="p_era_${rowId}">0.00</td>
        <td>
          <button type="button" class="sheet-btn small delete" onclick="window.removePitcherRow(${rowId})">삭제</button>
        </td>
      `;

      row.querySelector(`#p_inning_${rowId}`).addEventListener("input", () => updatePitcherEra(rowId));
      row.querySelector(`#p_er_${rowId}`).addEventListener("input", () => updatePitcherEra(rowId));

      if (data.inning || data.er) {
        setTimeout(() => updatePitcherEra(rowId), 0);
      }

      return row;
    }

    function createBattersRows() {
      battersBody.innerHTML = "";
      batterRowCounter = 0;
      for (let i = 1; i <= 9; i++) {
        battersBody.appendChild(createBatterRow({ order: i }));
      }
    }

    function createPitchersRows() {
      pitchersBody.innerHTML = "";
      pitcherRowCounter = 0;
      for (let i = 1; i <= 4; i++) {
        pitchersBody.appendChild(createPitcherRow());
      }
    }

    function getInningRow(prefix) {
      const arr = [];
      for (let i = 1; i <= inningCount; i++) {
        arr.push(document.getElementById(`${prefix}${i}`).value.trim());
      }
      return arr;
    }

    function getBatters() {
      const arr = [];
      const rows = [...battersBody.querySelectorAll("tr")];

      rows.forEach(row => {
        const rowId = row.dataset.rowId;
        const recordText = document.getElementById(`b_record_${rowId}`).value.trim();
        const stats = calculateBatterStats(recordText);

        const item = {
          order: document.getElementById(`b_order_${rowId}`).value.trim(),
          name: document.getElementById(`b_name_${rowId}`).value.trim(),
          position: document.getElementById(`b_pos_${rowId}`).value.trim(),
          record: recordText,
          isSub: row.classList.contains("sub-row"),
          stats: {
            ab: stats.ab,
            h: stats.h,
            double: stats.double,
            triple: stats.triple,
            hr: stats.hr,
            rbi: stats.rbi,
            r: stats.r,
            so: stats.so
          }
        };

        if (item.name || item.position || item.record) arr.push(item);
      });

      return arr;
    }

    function getPitchers() {
      const arr = [];
      const rows = [...pitchersBody.querySelectorAll("tr")];

      rows.forEach(row => {
        const rowId = row.dataset.pitcherRowId;
        const item = {
          name: document.getElementById(`p_name_${rowId}`).value.trim(),
          decision: document.getElementById(`p_decision_${rowId}`).value.trim(),
          inning: document.getElementById(`p_inning_${rowId}`).value.trim(),
          runs: document.getElementById(`p_runs_${rowId}`).value.trim(),
          er: document.getElementById(`p_er_${rowId}`).value.trim(),
          hits: document.getElementById(`p_hits_${rowId}`).value.trim(),
          hr: document.getElementById(`p_hr_${rowId}`).value.trim(),
          so: document.getElementById(`p_so_${rowId}`).value.trim(),
          bb: document.getElementById(`p_bb_${rowId}`).value.trim(),
          era: document.getElementById(`p_era_${rowId}`).textContent
        };
        if (item.name) arr.push(item);
      });

      return arr;
    }

    function resetForm() {
      currentEditId = null;
      gameDateInput.value = getDefaultDate();
      gameTypeInput.value = "practice";
      gameTimeInput.value = "";
      opponentInput.value = "";
      homeAwayInput.value = "";
      finalScoreInput.value = "";
      gameResultInput.value = "";
      inningCount = 9;
      renderInningTable();
      createBattersRows();
      createPitchersRows();
      saveBtn.textContent = "저장";
    }

    function buildRecordSummary(data) {
      return `${data.homeAway || "-"} ${data.finalScore || "-"} ${data.gameResult || "-"}`;
    }

    async function loadLineupToSheet(dateStr) {
      if (!dateStr || currentEditId) return;

      const selectedType = gameTypeInput.value || "practice";
      let snap = await getDoc(doc(db, "lineups", `${selectedType}_${dateStr}`));
      if (!snap.exists() && selectedType === "league") {
        snap = await getDoc(doc(db, "lineups", dateStr));
      }
      if (!snap.exists()) return;

      const lineup = snap.data();
      if (!lineup?.players) return;

      createBattersRows();

      lineup.players.forEach((player, idx) => {
        const row = battersBody.querySelectorAll("tr")[idx];
        if (!row) return;
        const rowId = row.dataset.rowId;

        document.getElementById(`b_order_${rowId}`).value = player.order || "";
        document.getElementById(`b_name_${rowId}`).value = player.name || "";
        document.getElementById(`b_pos_${rowId}`).value = player.position || "";
      });

      if (lineup.pitcher) {
        const firstPitcherRow = pitchersBody.querySelector("tr");
        if (firstPitcherRow) {
          const rowId = firstPitcherRow.dataset.pitcherRowId;
          document.getElementById(`p_name_${rowId}`).value = lineup.pitcher;
        }
      }
    }

    function renderSheets() {
      sheetList.innerHTML = "";

      const filteredSheets = sheets.filter((sheet) => {
        if (currentFilter === "all") return true;
        return (sheet.gameType || "league") === currentFilter;
      });

      if (!filteredSheets.length) {
        sheetList.innerHTML = `<p class="empty-text">선택한 경기 종류의 기록지가 아직 없어.</p>`;
        return;
      }

      filteredSheets.forEach((sheet) => {
        const innings = sheet.innings || {
          header: ["1","2","3","4","5","6","7","8","9"],
          away: [],
          home: []
        };
        const gameType = sheet.gameType || "league";
        const gameTypeText = gameType === "league" ? "리그 경기" : "연습경기";

        const box = document.createElement("div");
        box.className = "sheet-box";

        box.innerHTML = `
          <div class="sheet-top">${sheet.gameDate || "-"} ${sheet.gameTime || ""} vs ${sheet.opponent || "-"} (${sheet.homeAway || "-"}) ${sheet.finalScore || "-"} ${sheet.gameResult || "-"}</div>
          <div style="margin-bottom:10px;"><span class="record-chip ${gameType === "league" ? "league" : "practice"}">${gameTypeText}</span></div>

          <div class="result-subtitle">이닝 점수</div>
          <div class="sheet-table-wrap">
            <table class="sheet-table">
              <thead>
                <tr>
                  <th>팀</th>
                  ${(innings.header || []).map(v => `<th>${v}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th>상대팀</th>
                  ${(innings.away || []).map(v => `<td>${v || ""}</td>`).join("")}
                </tr>
                <tr>
                  <th>우리팀</th>
                  ${(innings.home || []).map(v => `<td>${v || ""}</td>`).join("")}
                </tr>
              </tbody>
            </table>
          </div>

          <div class="result-subtitle">타자 기록</div>
          <div class="sheet-table-wrap">
            <table class="sheet-table">
              <thead>
                <tr>
                  <th>타순</th><th>선수명</th><th>포지션</th><th>기록</th><th>타수</th><th>안타</th><th>2루타</th><th>3루타</th><th>홈런</th><th>타점</th><th>득점</th><th>삼진</th>
                </tr>
              </thead>
              <tbody>
                ${(sheet.batters || []).map(b => `
                  <tr ${b.isSub ? 'class="sub-row"' : ""}>
                    <td>${b.order || ""}</td><td>${b.name || ""}</td><td>${b.position || ""}</td><td>${b.record || ""}</td>
                    <td>${b.stats?.ab ?? 0}</td><td>${b.stats?.h ?? 0}</td><td>${b.stats?.double ?? 0}</td><td>${b.stats?.triple ?? 0}</td><td>${b.stats?.hr ?? 0}</td><td>${b.stats?.rbi ?? 0}</td><td>${b.stats?.r ?? 0}</td><td>${b.stats?.so ?? 0}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>

          <div class="result-subtitle">투수 기록</div>
          <div class="sheet-table-wrap">
            <table class="sheet-table">
              <thead>
                <tr><th>선수명</th><th>결과</th><th>이닝</th><th>실점</th><th>자책</th><th>피안타</th><th>피홈런</th><th>탈삼진</th><th>사사구</th><th>ERA</th></tr>
              </thead>
              <tbody>
                ${(sheet.pitchers || []).map(p => `
                  <tr><td>${p.name || ""}</td><td>${p.decision || ""}</td><td>${p.inning || ""}</td><td>${p.runs || ""}</td><td>${p.er || ""}</td><td>${p.hits || ""}</td><td>${p.hr || ""}</td><td>${p.so || ""}</td><td>${p.bb || ""}</td><td>${p.era || "0.00"}</td></tr>
                `).join("")}
              </tbody>
            </table>
          </div>

          <div class="sheet-actions">
            <button class="sheet-btn" onclick="window.editSheet('${sheet.id}')">수정</button>
            <button class="sheet-btn delete" onclick="window.deleteSheet('${sheet.id}')">삭제</button>
          </div>
        `;
        sheetList.appendChild(box);
      });
    }

    async function syncRecordSummary(sheetId, data) {
      await setDoc(doc(db, "records", sheetId), {
        date: data.gameDate,
        gameType: data.gameType || "league",
        opponent: data.opponent,
        result: data.gameResult === "승리" ? "승" : data.gameResult === "패배" ? "패" : "무",
        score: data.finalScore,
        memo: buildRecordSummary(data),
        updatedAt: Date.now(),
        createdAt: data.createdAt
      });
    }

    async function saveSheet() {
      const now = Date.now();

      const inningsHeader = Array.from({ length: inningCount }, (_, i) => String(i + 1));

      const data = {
        gameDate: gameDateInput.value.trim(),
        gameType: gameTypeInput.value,
        gameTime: gameTimeInput.value.trim(),
        opponent: opponentInput.value.trim(),
        homeAway: homeAwayInput.value,
        finalScore: finalScoreInput.value.trim(),
        gameResult: gameResultInput.value,
        innings: {
          header: inningsHeader,
          away: getInningRow("away"),
          home: getInningRow("home")
        },
        batters: getBatters(),
        pitchers: getPitchers(),
        updatedAt: now
      };

      if (!data.gameDate || !data.opponent || !data.finalScore || !data.gameResult) {
        alert("경기 날짜, 상대팀, 최종 스코어, 결과는 꼭 입력해줘.");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = currentEditId ? "수정 중..." : "저장 중...";

      try {
        if (currentEditId) {
          await updateDoc(doc(db, "scoresheets", currentEditId), data);
          await syncRecordSummary(currentEditId, { ...data, createdAt: now });
          alert("기록지 수정 완료!");
        } else {
          const added = await addDoc(collection(db, "scoresheets"), {
            ...data,
            createdAt: now
          });
          await syncRecordSummary(added.id, { ...data, createdAt: now });
          alert("기록지 저장 완료!");
        }

        resetForm();
      } catch (error) {
        console.error(error);
        alert("기록지 저장 중 오류가 발생했어.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "저장";
      }
    }

    function fillForm(sheet) {
      gameDateInput.value = sheet.gameDate || "";
      gameTypeInput.value = sheet.gameType || "league";
      gameTimeInput.value = sheet.gameTime || "";
      opponentInput.value = sheet.opponent || "";
      homeAwayInput.value = sheet.homeAway || "";
      finalScoreInput.value = sheet.finalScore || "";
      gameResultInput.value = sheet.gameResult || "";

      const away = sheet.innings?.away || [];
      const home = sheet.innings?.home || [];
      const header = sheet.innings?.header || ["1","2","3","4","5","6","7","8","9"];

      inningCount = header.length;
      renderInningTable(away, home);

      createBattersRows();
      battersBody.innerHTML = "";
      batterRowCounter = 0;
      (sheet.batters || []).forEach((b) => {
        battersBody.appendChild(createBatterRow({
          order: b.order || "",
          name: b.name || "",
          position: b.position || "",
          record: b.record || "",
          isSub: !!b.isSub
        }));
      });

      pitchersBody.innerHTML = "";
      pitcherRowCounter = 0;
      if (sheet.pitchers && sheet.pitchers.length > 0) {
        sheet.pitchers.forEach((p) => {
          pitchersBody.appendChild(createPitcherRow({
            name: p.name || "",
            decision: p.decision || "",
            inning: p.inning || "",
            runs: p.runs || "",
            er: p.er || "",
            hits: p.hits || "",
            hr: p.hr || "",
            so: p.so || "",
            bb: p.bb || ""
          }));
        });
      } else {
        for (let i = 1; i <= 4; i++) {
          pitchersBody.appendChild(createPitcherRow());
        }
      }
    }

    function editSheet(id) {
      const target = sheets.find(s => s.id === id);
      if (!target) return;

      currentEditId = id;
      fillForm(target);
      saveBtn.textContent = "수정 저장";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteSheet(id) {
      const ok = confirm("이 기록지를 삭제할까?");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "scoresheets", id));
        await deleteDoc(doc(db, "records", id));
        alert("기록지 삭제 완료!");
        if (currentEditId === id) resetForm();
      } catch (error) {
        console.error(error);
        alert("기록지 삭제 중 오류가 발생했어.");
      }
    }

    window.addSubRow = function(rowId) {
      const baseRow = battersBody.querySelector(`tr[data-row-id="${rowId}"]`);
      if (!baseRow) return;

      const currentOrder = document.getElementById(`b_order_${rowId}`).value.trim();
      const newRow = createBatterRow({
        order: currentOrder,
        isSub: true
      });

      baseRow.insertAdjacentElement("afterend", newRow);
    };

    window.removeBatterRow = function(rowId) {
      const row = battersBody.querySelector(`tr[data-row-id="${rowId}"]`);
      if (!row) return;

      if (battersBody.querySelectorAll("tr").length <= 1) return;
      row.remove();
    };

    window.removePitcherRow = function(rowId) {
      const row = pitchersBody.querySelector(`tr[data-pitcher-row-id="${rowId}"]`);
      if (!row) return;

      if (pitchersBody.querySelectorAll("tr").length <= 1) return;
      row.remove();
    };

    window.editSheet = editSheet;
    window.deleteSheet = deleteSheet;

    addInningBtn.addEventListener("click", () => {
      const away = getInningRow("away");
      const home = getInningRow("home");
      inningCount += 1;
      renderInningTable(away, home);
    });

    removeInningBtn.addEventListener("click", () => {
      if (inningCount <= 9) return;
      const away = getInningRow("away").slice(0, -1);
      const home = getInningRow("home").slice(0, -1);
      inningCount -= 1;
      renderInningTable(away, home);
    });

    addPitcherBtn.addEventListener("click", () => {
      pitchersBody.appendChild(createPitcherRow());
    });

    filterButtons.forEach((btn) => btn.addEventListener("click", () => { currentFilter = btn.dataset.filter; filterButtons.forEach((b) => b.classList.toggle("active", b === btn)); renderSheets(); }));

    saveBtn.addEventListener("click", saveSheet);
    resetBtn.addEventListener("click", resetForm);

    gameDateInput.addEventListener("change", async () => {
      if (!currentEditId) await loadLineupToSheet(gameDateInput.value);
    });

    gameTypeInput.addEventListener("change", async () => {
      if (!currentEditId) await loadLineupToSheet(gameDateInput.value);
      renderSheets();
    });

    createBattersRows();
    createPitchersRows();
    renderInningTable();
    gameDateInput.value = getDefaultDate();
    gameTypeInput.value = "practice";

    const sheetQuery = query(collection(db, "scoresheets"), orderBy("createdAt", "desc"));

    onSnapshot(sheetQuery, (snapshot) => {
      sheets = [];
      snapshot.forEach((docu) => {
        sheets.push({
          id: docu.id,
          ...docu.data()
        });
      });
      renderSheets();
      if (initialEditId) {
        const target = sheets.find((s) => s.id === initialEditId);
        if (target) {
          editSheet(initialEditId);
          history.replaceState({}, "", "admin-scoresheet.html");
        }
      }
    }, (error) => {
      console.error(error);
      sheetList.innerHTML = `<p class="empty-text">기록지를 불러오지 못했어.</p>`;
    });

    loadLineupToSheet(gameDateInput.value);
  </script>

</body>
</html>
