<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | 레이 마린스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="index.html">메인으로</a>
    </header>

    <main>
      <section class="card-box">
        <h2>로그인</h2>
        <div class="form-card">
          <label for="mcNick">마인크래프트 닉네임</label>
          <input id="mcNick" class="input" placeholder="마인크래프트 닉네임">
          <label for="password">비밀번호</label>
          <input id="password" type="password" class="input" placeholder="비밀번호">
          <div class="button-row">
            <button class="primary-button" id="loginBtn">로그인</button>
            <button class="secondary-button" type="button" onclick="location.href='signup.html'">회원가입</button>
            
          </div>
          <div id="msg" class="msg"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">

    import { db } from "./firebase-config.js";
    import {
      collection,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const msg = document.getElementById("msg");
    const loginBtn = document.getElementById("loginBtn");

    async function login() {
      const mcNick = document.getElementById("mcNick").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!mcNick || !password) {
        msg.textContent = "모든 칸을 입력해주세요.";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "로그인 중...";

      try {
        const q = query(
          collection(db, "users"),
          where("mcNick", "==", mcNick)
        );

        const snap = await getDocs(q);

        if (snap.empty) {
          msg.textContent = "존재하지 않는 닉네임입니다.";
          return;
        }

        const docData = snap.docs[0];
        const user = { id: docData.id, ...docData.data() };

        if (user.password !== password) {
          msg.textContent = "비밀번호가 맞지 않습니다.";
          return;
        }

        if (!user.approved) {
          msg.textContent = "아직 관리자 승인이 안 된 계정입니다.";
          return;
        }

        sessionStorage.setItem("currentUser", JSON.stringify(user));
        location.href = "index.html";

      } catch (error) {
        console.error(error);
        msg.textContent = "로그인 중 오류가 발생했습니다.";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "로그인";
      }
    }

    loginBtn.addEventListener("click", login);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  
  </script>
</body>
</html>
