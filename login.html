<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card-box">
    <h2>로그인</h2>
    <input id="mcNick" class="input" placeholder="마인크래프트 닉네임">
    <input id="password" type="password" class="input" placeholder="비밀번호">
    <button class="btn" id="loginBtn">로그인</button>
    <button class="btn sub" onclick="location.href='signup.html'">회원가입</button>
    <div id="msg" class="msg"></div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const msg = document.getElementById("msg");
    const loginBtn = document.getElementById("loginBtn");

    async function login() {
      const mcNick = document.getElementById("mcNick").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!mcNick || !password) {
        msg.textContent = "모든 칸을 입력해주세요.";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "로그인 중...";

      try {
        const q = query(
          collection(db, "users"),
          where("mcNick", "==", mcNick)
        );

        const snap = await getDocs(q);

        if (snap.empty) {
          msg.textContent = "존재하지 않는 닉네임입니다.";
          return;
        }

        const docData = snap.docs[0];
        const user = { id: docData.id, ...docData.data() };

        if (user.password !== password) {
          msg.textContent = "비밀번호가 맞지 않습니다.";
          return;
        }

        if (!user.approved) {
          msg.textContent = "아직 관리자 승인이 안 된 계정입니다.";
          return;
        }

        sessionStorage.setItem("currentUser", JSON.stringify(user));
        location.href = "index.html";

      } catch (error) {
        console.error(error);
        msg.textContent = "로그인 중 오류가 발생했습니다.";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "로그인";
      }
    }

    loginBtn.addEventListener("click", login);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
