<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card-box">
    <h2>회원가입</h2>
    <input id="mcNick" class="input" placeholder="마인크래프트 닉네임">
    <input id="discordTag" class="input" placeholder="디스코드 태그">
    <input id="password" type="password" class="input" placeholder="비밀번호">
    <button class="btn" id="signupBtn">회원가입</button>
    <button class="btn sub" onclick="location.href='login.html'">로그인으로 이동</button>
    <div id="msg" class="msg"></div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      getDocs,
      query,
      where,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const msg = document.getElementById("msg");
    const signupBtn = document.getElementById("signupBtn");

    async function signup() {
      const mcNick = document.getElementById("mcNick").value.trim();
      const discordTag = document.getElementById("discordTag").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!mcNick || !discordTag || !password) {
        msg.textContent = "모든 칸을 입력해줘.";
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = "처리 중...";

      try {
        const userRef = collection(db, "users");

        const dupQ = query(userRef, where("mcNick", "==", mcNick));
        const dupSnap = await getDocs(dupQ);

        if (!dupSnap.empty) {
          msg.textContent = "이미 존재하는 마인크래프트 닉네임이야.";
          signupBtn.disabled = false;
          signupBtn.textContent = "회원가입";
          return;
        }

        const allUsers = await getDocs(userRef);
        const isFirstUser = allUsers.empty;

        const role = isFirstUser ? "super_admin" : "member";
        const approved = isFirstUser ? true : false;

        await addDoc(userRef, {
          mcNick,
          discordTag,
          password,
          approved,
          role,
          rosterNick: "",
          backNumber: "",
          createdAt: Date.now()
        });

        if (isFirstUser) {
          alert("회원가입 완료! 첫 가입자라 최고관리자로 등록됐어.");
          msg.textContent = "회원가입 완료. 이제 로그인하면 돼.";
        } else {
          alert("회원가입 완료! 관리자 승인 후 로그인할 수 있어.");
          msg.textContent = "회원가입 신청 완료. 관리자 승인 후 로그인 가능.";
        }

        msg.className = "msg ok";

        document.getElementById("mcNick").value = "";
        document.getElementById("discordTag").value = "";
        document.getElementById("password").value = "";

      } catch (error) {
        console.error(error);
        msg.textContent = "회원가입 중 오류가 발생했어.";
      } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = "회원가입";
      }
    }

    signupBtn.addEventListener("click", signup);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") signup();
    });
  </script>
</body>
</html>
