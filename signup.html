<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | 레이 마린스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="login.html">로그인으로</a>
    </header>

    <main>
      <section class="card-box">
        <h2>회원가입</h2>
        <p class="main-box-desc">가입 후 관리자 승인까지 완료되면 로그인할 수 있어.</p>
        <div class="form-card">
          <label for="mcNick">마인크래프트 닉네임</label>
          <input id="mcNick" class="input" placeholder="마인크래프트 닉네임">
          <label for="discordTag">디스코드 닉네임</label>
          <input id="discordTag" class="input" placeholder="예: name#1234 또는 name">
          <label for="password">비밀번호</label>
          <input id="password" type="password" class="input" placeholder="비밀번호">
          <div class="button-row">
            <button class="primary-button" id="signupBtn">회원가입</button>
            <a class="secondary-button" href="login.html">로그인</a>
          </div>
          <div id="msg" class="msg"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">

    import { db } from "./firebase-config.js";
    import {
      collection,
      getDocs,
      query,
      where,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const msg = document.getElementById("msg");
    const signupBtn = document.getElementById("signupBtn");

    async function signup() {
      const mcNick = document.getElementById("mcNick").value.trim();
      const discordTag = document.getElementById("discordTag").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!mcNick || !discordTag || !password) {
        msg.textContent = "모든 칸을 입력해주세요.";
        msg.className = "msg";
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = "처리 중...";
      msg.textContent = "회원가입 확인 중...";
      msg.className = "msg";

      try {
        console.log("회원가입 시작");

        const userRef = collection(db, "users");

        // 중복 검사
        const dupQ = query(userRef, where("mcNick", "==", mcNick));
        const dupSnap = await getDocs(dupQ);

        if (!dupSnap.empty) {
          msg.textContent = "이미 존재하는 마인크래프트 닉네임입니다.";
          return;
        }

        msg.textContent = "가입 조건 확인 중...";

        // 첫 가입자 확인
        const allUsers = await getDocs(userRef);
        const isFirstUser = allUsers.empty;

        const role = isFirstUser ? "super_admin" : "member";
        const approved = isFirstUser ? true : false;

        msg.textContent = "데이터 저장 중...";

        // 저장
        await addDoc(userRef, {
          mcNick,
          discordTag,
          password,
          approved,
          role,
          rosterNick: "",
          backNumber: "",
          createdAt: Date.now()
        });

        // 입력 초기화
        document.getElementById("mcNick").value = "";
        document.getElementById("discordTag").value = "";
        document.getElementById("password").value = "";

        msg.className = "msg ok";

        if (isFirstUser) {
          msg.textContent = "회원가입 완료! (최고관리자)";
          alert("회원가입 완료! 첫 가입자라 최고관리자로 등록됐습니다.");
        } else {
          msg.textContent = "회원가입 완료! (승인 대기)";
          alert("회원가입 완료! 관리자 승인 후 로그인 가능.");
        }

        // 로그인 페이지 이동
        location.href = "login.html";

      } catch (error) {
        console.error(error);
        msg.textContent = "회원가입 실패: " + error.message;
        alert("회원가입 중 오류 발생");
      } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = "회원가입";
      }
    }

    signupBtn.addEventListener("click", signup);

    // 엔터키로 실행
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") signup();
    });
  
  </script>
</body>
</html>
