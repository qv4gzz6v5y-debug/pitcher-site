<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레이 마린스 - 투수 정보 관리</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f3f3f3;
      color: #111111;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 36px 32px 60px;
    }

    .top-header {
      border-bottom: 1px solid #222222;
      padding-bottom: 24px;
      margin-bottom: 22px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .top-header h1 {
      font-size: 72px;
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .home-link,
    .home-link:visited,
    .home-link:active {
      color: #111111 !important;
      text-decoration: none !important;
      font-size: 20px;
      font-weight: 300;
    }

    .home-link:hover {
      opacity: 0.65;
    }

    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 36px;
    }

    .tab-link,
    .tab-link:visited,
    .tab-link:active {
      text-decoration: none !important;
      color: #111111 !important;
      background: #ffffff;
      border: 1px solid #d6d6d6;
      border-radius: 14px;
      padding: 10px 16px;
      font-size: 17px;
      font-weight: 500;
    }

    .tab-link.active {
      border-color: #111111;
      background: #f8f8f8;
    }

    .main-box {
      max-width: 1000px;
      margin: 0 auto;
      background: #f8f8f8;
      border-radius: 28px;
      padding: 34px 34px 28px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .main-box-title {
      font-size: 60px;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .main-box-desc {
      margin-top: 16px;
      font-size: 22px;
      font-weight: 300;
      color: #666666;
      word-break: keep-all;
    }

    .form-box,
    .list-box {
      margin-top: 28px;
      background: #ffffff;
      border: 1px solid #d6d6d6;
      border-radius: 22px;
      padding: 24px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 16px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      height: 56px;
      border: 1px solid #d6d6d6;
      border-radius: 16px;
      padding: 0 18px;
      font-size: 18px;
      background: #ffffff;
      color: #111111;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: #111111;
    }

    .field small {
      font-size: 14px;
      color: #777777;
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      height: 56px;
      padding: 0 24px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .primary-btn {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }

    .secondary-btn {
      background: #ffffff;
      color: #111111;
      border-color: #d6d6d6;
    }

    .danger-btn {
      background: #8b0000;
      color: #ffffff;
      border-color: #8b0000;
    }

    .message-text {
      margin-top: 16px;
      font-size: 16px;
      color: #666666;
    }

    .pitcher-list {
      display: grid;
      gap: 14px;
    }

    .pitcher-card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid #e2e2e2;
      border-radius: 18px;
      padding: 18px;
      background: #fafafa;
    }

    .pitcher-card-left {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      min-width: 0;
    }

    .pitcher-logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 50%;
      background: #ffffff;
      flex-shrink: 0;
    }

    .pitcher-info {
      min-width: 0;
    }

    .pitcher-name {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
    }

    .pitcher-sub {
      margin-top: 6px;
      font-size: 18px;
      color: #666666;
    }

    .pitcher-meta {
      margin-top: 10px;
      font-size: 17px;
      color: #333333;
      line-height: 1.6;
      word-break: keep-all;
    }

    .pitcher-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .empty-list {
      font-size: 17px;
      color: #777777;
    }

    @media (max-width: 900px) {
      .top-header h1 {
        font-size: 52px;
      }

      .main-box-title {
        font-size: 46px;
      }

      .main-box-desc {
        font-size: 20px;
      }

      .pitcher-name {
        font-size: 24px;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 24px 16px 44px;
      }

      .top-header h1 {
        font-size: 40px;
      }

      .home-link {
        font-size: 16px !important;
      }

      .main-box {
        padding: 24px 18px 20px;
      }

      .main-box-title {
        font-size: 38px;
      }

      .main-box-desc {
        font-size: 18px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .action-row {
        flex-direction: column;
      }

      .pitcher-card {
        flex-direction: column;
      }

      .pitcher-actions {
        width: 100%;
        flex-direction: row;
      }

      .pitcher-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top-header">
      <div class="header-row">
        <h1>레이 마린스</h1>
        <a href="admin.html" class="home-link">메인으로</a>
      </div>
    </header>

    <nav class="tab-row">
      <a href="admin.html" class="tab-link">관리자 홈</a>
      <a href="admin-lineup.html" class="tab-link">라인업 관리</a>
      <a href="admin-pitchers.html" class="tab-link active">투수 정보 관리</a>
      <a href="admin-record.html" class="tab-link">기록지 관리</a>
    </nav>

    <main>
      <section class="main-box">
        <h2 class="main-box-title">투수 정보 관리</h2>
        <p class="main-box-desc">선수용 투수 정보 페이지에 표시될 투수 정보를 등록하고 관리할 수 있습니다.</p>

        <div class="form-box">
          <h3 class="section-title">투수 등록</h3>

          <div class="form-grid">
            <div class="field">
              <label for="nickname">닉네임</label>
              <input type="text" id="nickname" placeholder="예: 레이투수 1" />
            </div>

            <div class="field">
              <label for="handedness">투구 방향</label>
              <select id="handedness">
                <option value="">선택</option>
                <option value="우투">우투</option>
                <option value="좌투">좌투</option>
              </select>
            </div>

            <div class="field full">
              <label for="pitchTypes">구종</label>
              <input type="text" id="pitchTypes" placeholder="예: 포심, 슬라이더, 체인지업" />
              <small>쉼표(,)로 구분해서 입력해줘.</small>
            </div>

            <div class="field full">
              <label for="logo">로고 경로</label>
              <input type="text" id="logo" placeholder="예: logos/rms.png" />
              <small>비워두면 기본 로고가 사용돼.</small>
            </div>
          </div>

          <div class="action-row">
            <button type="button" class="primary-btn" id="saveBtn">저장</button>
            <button type="button" class="secondary-btn" id="resetBtn">입력 초기화</button>
          </div>

          <p id="messageText" class="message-text">아직 저장된 내용이 없습니다.</p>
        </div>

        <div class="list-box">
          <h3 class="section-title">등록된 투수 목록</h3>
          <div id="pitcherList" class="pitcher-list">
            <div class="empty-list">불러오는 중...</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { db, auth } from "./firebase-config.js";
    import {
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      deleteDoc,
      doc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const nicknameEl = document.getElementById("nickname");
    const handednessEl = document.getElementById("handedness");
    const pitchTypesEl = document.getElementById("pitchTypes");
    const logoEl = document.getElementById("logo");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const messageText = document.getElementById("messageText");
    const pitcherListEl = document.getElementById("pitcherList");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function resetForm() {
      nicknameEl.value = "";
      handednessEl.value = "";
      pitchTypesEl.value = "";
      logoEl.value = "";
    }

    function setMessage(text) {
      messageText.textContent = text;
    }

    function normalizePitchTypes(text) {
      return text
        .split(",")
        .map(v => v.trim())
        .filter(Boolean);
    }

    function getLogoPath(data) {
      return data.logo || data.teamLogo || data.logoPath || "logos/default.png";
    }

    async function savePitcher() {
      const nickname = nicknameEl.value.trim();
      const handedness = handednessEl.value.trim();
      const pitchTypes = normalizePitchTypes(pitchTypesEl.value);
      const logo = logoEl.value.trim();

      if (!nickname) {
        setMessage("닉네임은 꼭 입력해야 해.");
        nicknameEl.focus();
        return;
      }

      if (!handedness) {
        setMessage("우투인지 좌투인지 선택해줘.");
        handednessEl.focus();
        return;
      }

      if (pitchTypes.length === 0) {
        setMessage("구종은 하나 이상 입력해줘.");
        pitchTypesEl.focus();
        return;
      }

      try {
        await addDoc(collection(db, "pitchers"), {
          nickname,
          handedness,
          pitchTypes,
          logo: logo || "logos/default.png",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        setMessage("투수 정보가 저장됐어.");
        resetForm();
        await loadPitchers();
      } catch (error) {
        console.error("투수 저장 실패:", error);
        setMessage("저장 중 오류가 발생했어: " + error.message);
      }
    }

    async function deletePitcher(id) {
      const ok = confirm("이 투수 정보를 삭제할까?");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "pitchers", id));
        setMessage("투수 정보가 삭제됐어.");
        await loadPitchers();
      } catch (error) {
        console.error("삭제 실패:", error);
        setMessage("삭제 중 오류가 발생했어: " + error.message);
      }
    }

    async function loadPitchers() {
      try {
        const q = query(collection(db, "pitchers"), orderBy("nickname"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          pitcherListEl.innerHTML = `<div class="empty-list">등록된 투수가 아직 없어.</div>`;
          return;
        }

        pitcherListEl.innerHTML = "";

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const id = docSnap.id;

          const nickname = escapeHtml(data.nickname || "-");
          const handedness = escapeHtml(data.handedness || "-");
          const pitchTypes = Array.isArray(data.pitchTypes)
            ? data.pitchTypes.map(v => escapeHtml(v)).join(", ")
            : "-";
          const logo = escapeHtml(getLogoPath(data));

          const card = document.createElement("div");
          card.className = "pitcher-card";
          card.innerHTML = `
            <div class="pitcher-card-left">
              <img src="${logo}" alt="팀 로고" class="pitcher-logo" onerror="this.src='logos/default.png'">
              <div class="pitcher-info">
                <div class="pitcher-name">${nickname}</div>
                <div class="pitcher-sub">${handedness}</div>
                <div class="pitcher-meta">구종: ${pitchTypes}</div>
              </div>
            </div>

            <div class="pitcher-actions">
              <button type="button" class="danger-btn" data-id="${id}">삭제</button>
            </div>
          `;

          pitcherListEl.appendChild(card);
        });

        pitcherListEl.querySelectorAll(".danger-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            deletePitcher(btn.dataset.id);
          });
        });
      } catch (error) {
        console.error("목록 불러오기 실패:", error);
        pitcherListEl.innerHTML = `<div class="empty-list">투수 목록을 불러오지 못했습니다.</div>`;
      }
    }

    saveBtn.addEventListener("click", savePitcher);
    resetBtn.addEventListener("click", resetForm);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        alert("로그인이 필요합니다.");
        location.href = "login.html";
        return;
      }

      await loadPitchers();
    });
  </script>
</body>
</html>
