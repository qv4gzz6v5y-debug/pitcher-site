<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 - 투수 정보 등록</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f3f3f3;
      color: #111;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 40px 32px;
    }
    .top-header {
      border-bottom: 1px solid #222;
      padding-bottom: 24px;
      margin-bottom: 48px;
    }
    .top-header h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 0.08em;
    }
    .main-box {
      max-width: 900px;
      margin: 0 auto;
      background: #f8f8f8;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.04);
    }
    .main-title {
      font-size: 48px;
      font-weight: 700;
    }
    .main-desc {
      margin-top: 14px;
      font-size: 20px;
      color: #666;
      font-weight: 300;
    }
    .form-grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .field {
      background: #fff;
      border: 1px solid #d6d6d6;
      border-radius: 18px;
      padding: 18px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #555;
      letter-spacing: 0.04em;
    }
    .field input {
      width: 100%;
      height: 50px;
      border: 1px solid #d6d6d6;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
    }
    .field input:focus { border-color: #111; }
    .full { grid-column: 1 / -1; }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }
    button {
      height: 52px;
      padding: 0 20px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary {
      background: #111;
      color: #fff;
      border: 1px solid #111;
    }
    .secondary {
      background: #fff;
      color: #111;
      border: 1px solid #d6d6d6;
    }
    .message {
      margin-top: 16px;
      font-size: 15px;
      color: #555;
    }
    .list-box {
      margin-top: 28px;
      background: #fff;
      border: 1px solid #d6d6d6;
      border-radius: 18px;
      padding: 20px;
    }
    .list-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .pitcher-item {
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 10px;
      background: #fafafa;
    }
    .pitcher-item:first-child { margin-top: 0; }
    .pitcher-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .pitcher-meta {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }
    @media (max-width: 768px) {
      .page { padding: 24px 16px; }
      .top-header h1 { font-size: 36px; }
      .main-title { font-size: 36px; }
      .form-grid { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top-header">
      <h1>레이 마린스</h1>
    </header>

    <main class="main-box">
      <h2 class="main-title">관리자 - 투수 정보 등록</h2>
      <p class="main-desc">여기서 저장한 투수 정보가 선수용 검색 페이지에 바로 반영됩니다.</p>

      <div class="form-grid">
        <div class="field">
          <label for="nickname">닉네임</label>
          <input type="text" id="nickname" placeholder="예: 레이투수1" />
        </div>

        <div class="field">
          <label for="speed">구속</label>
          <input type="text" id="speed" placeholder="예: 145km/h" />
        </div>

        <div class="field">
          <label for="throwBat">투타</label>
          <input type="text" id="throwBat" placeholder="예: 우투우타" />
        </div>

        <div class="field">
          <label for="control">제구</label>
          <input type="text" id="control" placeholder="예: 중상" />
        </div>

        <div class="field">
          <label for="stamina">스태미너</label>
          <input type="text" id="stamina" placeholder="예: 상" />
        </div>

        <div class="field full">
          <label for="pitchTypes">구종</label>
          <input type="text" id="pitchTypes" placeholder="예: 포심, 슬라이더, 체인지업" />
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="saveBtn">저장</button>
        <button class="secondary" id="resetBtn" type="button">입력 초기화</button>
      </div>

      <p class="message" id="messageText">아직 저장된 내용이 없습니다.</p>

      <div class="list-box">
        <div class="list-title">등록된 투수 목록</div>
        <div id="pitcherListBox"></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { db, auth } from "./firebase-config.js";
    import {
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const nicknameEl = document.getElementById("nickname");
    const speedEl = document.getElementById("speed");
    const throwBatEl = document.getElementById("throwBat");
    const controlEl = document.getElementById("control");
    const staminaEl = document.getElementById("stamina");
    const pitchTypesEl = document.getElementById("pitchTypes");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const messageText = document.getElementById("messageText");
    const pitcherListBox = document.getElementById("pitcherListBox");

    function resetForm() {
      nicknameEl.value = "";
      speedEl.value = "";
      throwBatEl.value = "";
      controlEl.value = "";
      staminaEl.value = "";
      pitchTypesEl.value = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function savePitcher() {
      const nickname = nicknameEl.value.trim();
      const speed = speedEl.value.trim();
      const throwBat = throwBatEl.value.trim();
      const control = controlEl.value.trim();
      const stamina = staminaEl.value.trim();
      const pitchTypes = pitchTypesEl.value
        .split(",")
        .map(v => v.trim())
        .filter(Boolean);

      if (!nickname) {
        messageText.textContent = "닉네임은 꼭 입력해야 해.";
        return;
      }

      try {
        await addDoc(collection(db, "pitchers"), {
          nickname,
          speed,
          throwBat,
          control,
          stamina,
          pitchTypes,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        messageText.textContent = "투수 정보가 저장됐어.";
        resetForm();
      } catch (error) {
        console.error(error);
        messageText.textContent = "저장 중 오류가 발생했어.";
      }
    }

    function renderList(snapshot) {
      pitcherListBox.innerHTML = "";

      if (snapshot.empty) {
        pitcherListBox.innerHTML = `<div class="pitcher-meta">등록된 투수가 아직 없어.</div>`;
        return;
      }

      snapshot.forEach((docSnap) => {
        const p = docSnap.data();
        const name = escapeHtml(p.nickname || "-");
        const speed = escapeHtml(p.speed || "-");
        const throwBat = escapeHtml(p.throwBat || "-");
        const pitches = Array.isArray(p.pitchTypes) ? p.pitchTypes.map(escapeHtml).join(", ") : "-";

        pitcherListBox.innerHTML += `
          <div class="pitcher-item">
            <div class="pitcher-name">${name}</div>
            <div class="pitcher-meta">
              구속: ${speed}<br>
              투타: ${throwBat}<br>
              구종: ${pitches}
            </div>
          </div>
        `;
      });
    }

    saveBtn.addEventListener("click", savePitcher);
    resetBtn.addEventListener("click", resetForm);

    onAuthStateChanged(auth, async () => {
      const q = query(collection(db, "pitchers"), orderBy("nickname"));
      onSnapshot(q, renderList);
    });
  </script>
</body>
</html>
