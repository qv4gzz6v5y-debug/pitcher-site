<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>투수정보관리</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .pitcher-wrap {
      width: 95%;
      max-width: 1100px;
      margin: 34px auto;
    }

    .pitcher-card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .pitcher-card h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 34px;
    }

    .pitcher-input,
    .pitcher-select {
      width: 100%;
      box-sizing: border-box;
      margin: 10px 0;
      padding: 14px 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 18px;
      background: #fff;
    }

    .pitcher-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 10px;
    }

    .pitcher-btn.delete {
      background: #b00020;
    }

    .pitcher-btn.sub {
      background: #666;
    }

    .team-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: bold;
    }

    .team-logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      border-radius: 50%;
      background: white;
    }

    .list-item {
      background: #f8f8f8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      text-align: left;
    }

    .list-item p {
      margin: 0 0 10px 0;
      font-size: 18px;
      line-height: 1.6;
    }

    .page-note {
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pitch-add-row {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 10px;
      align-items: end;
      margin-top: 8px;
    }

    .pitch-list {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pitch-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #111827;
      font-size: 14px;
      font-weight: 700;
    }

    .chip-remove {
      border: none;
      background: transparent;
      color: #b00020;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }

    @media (max-width: 700px) {
      .pitch-add-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a class="top-link" href="admin.html">관리자 홈</a>
    </div>

    <div class="menu">
      <a href="admin.html">관리자 홈</a>
      <a href="admin-lineup.html">라인업 관리</a>
      <a href="admin-pitchers.html">투수정보관리</a>
      <a href="admin-scoresheet.html">기록지 관리</a>
    </div>
  </div>

  <div class="pitcher-wrap">
    <div class="pitcher-card">
      <h2>투수 정보 관리</h2>
      <p class="page-note">최고관리자 / 관리자 / 기록원만 수정할 수 있어.</p>

      <input id="name" class="pitcher-input" placeholder="닉네임">

      <select id="team" class="pitcher-select">
        <option value="">팀 선택</option>
        <option value="KRA">KRA</option>
        <option value="RMS">RMS</option>
        <option value="NDG">NDG</option>
        <option value="CPX">CPX</option>
        <option value="CLP">CLP</option>
        <option value="SLU">SLU</option>
        <option value="IH">IH</option>
        <option value="ODV">ODV</option>
      </select>

      <select id="angle" class="pitcher-select">
        <option value="">팔각도 선택</option>
        <option value="오버핸드">오버핸드</option>
        <option value="쓰리쿼터">쓰리쿼터</option>
        <option value="사이드암">사이드암</option>
        <option value="언더핸드">언더핸드</option>
      </select>

      <div class="pitch-add-row">
        <div>
          <label for="pitchType" class="page-note">구종</label>
          <select id="pitchType" class="pitcher-select">
            <option value="">구종 선택</option>
            <option value="포심">포심</option>
            <option value="투심">투심</option>
            <option value="싱커">싱커</option>
            <option value="커터">커터</option>
            <option value="슬라이더">슬라이더</option>
            <option value="자이로 슬라이더">자이로 슬라이더</option>
            <option value="스위퍼">스위퍼</option>
            <option value="슬러터">슬러터</option>
            <option value="슬러브">슬러브</option>
            <option value="커브볼">커브볼</option>
            <option value="너클커브">너클커브</option>
            <option value="이퓨스">이퓨스</option>
            <option value="너클볼">너클볼</option>
            <option value="체인지업">체인지업</option>
            <option value="서클 체인지업">서클 체인지업</option>
            <option value="벌칸 체인지업">벌칸 체인지업</option>
            <option value="킥 체인지">킥 체인지</option>
            <option value="스플리터">스플리터</option>
            <option value="포크볼">포크볼</option>
            <option value="팜볼">팜볼</option>
            <option value="스크류볼">스크류볼</option>
          </select>
        </div>

        <div>
          <label for="pitchSpeed" class="page-note">구속 단계</label>
          <select id="pitchSpeed" class="pitcher-select">
            <option value="">선택</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
          </select>
        </div>

        <div>
          <button class="pitcher-btn sub" type="button" id="addPitchBtn">구종 추가</button>
        </div>
      </div>

      <div id="pitchList" class="pitch-list"></div>

      <div class="action-row">
        <button class="pitcher-btn" id="saveBtn">저장</button>
        <button class="pitcher-btn sub" id="cancelBtn">초기화</button>
      </div>

      <p id="modeText" class="page-note"></p>
    </div>

    <div class="pitcher-card">
      <h2>검색</h2>
      <input id="searchInput" class="pitcher-input" placeholder="닉네임 검색" oninput="searchPitchers()">
    </div>

    <div class="pitcher-card">
      <h2>목록</h2>
      <div id="list"></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      doc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));
    const isStaff = currentUser && (
      currentUser.role === "super_admin" ||
      currentUser.role === "admin" ||
      currentUser.role === "scorer"
    );

    if (!isStaff) {
      alert("접근 권한이 없어.");
      location.href = "index.html";
    }

    const teamColors = {
      "KRA": "#c40000",
      "RMS": "#c9982c",
      "NDG": "#120725",
      "CPX": "#1B65BA",
      "CLP": "#0cb218",
      "SLU": "#850000",
      "IH": "#FEC804",
      "ODV": "#FF6A00"
    };

    const teamLogos = {
      "KRA": "logos/크라켄즈.png",
      "RMS": "logos/마린스.jpg",
      "NDG": "logos/드래곤즈.png",
      "CPX": "logos/청피.png",
      "CLP": "logos/플랜츠.png",
      "SLU": "logos/슬러거즈.png",
      "IH": "logos/호네츠.png",
      "ODV": "logos/오버드라이브.png"
    };

    let pitchers = [];
    let editId = null;
    let selectedPitches = [];

    const nameInput = document.getElementById("name");
    const teamInput = document.getElementById("team");
    const angleInput = document.getElementById("angle");
    const pitchTypeInput = document.getElementById("pitchType");
    const pitchSpeedInput = document.getElementById("pitchSpeed");
    const addPitchBtn = document.getElementById("addPitchBtn");
    const pitchList = document.getElementById("pitchList");
    const modeText = document.getElementById("modeText");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const list = document.getElementById("list");

    function renderPitchList() {
      pitchList.innerHTML = "";

      if (selectedPitches.length === 0) {
        pitchList.innerHTML = `<span class="page-note">추가된 구종이 없어.</span>`;
        return;
      }

      selectedPitches.forEach((pitch, index) => {
        const chip = document.createElement("span");
        chip.className = "pitch-chip";
        chip.innerHTML = `
          ${pitch.name}(${pitch.speed})
          <button type="button" class="chip-remove" onclick="removePitchAt(${index})">✕</button>
        `;
        pitchList.appendChild(chip);
      });
    }

    window.removePitchAt = function(index) {
      selectedPitches.splice(index, 1);
      renderPitchList();
    };

    function resetForm() {
      editId = null;
      nameInput.value = "";
      teamInput.value = "";
      angleInput.value = "";
      pitchTypeInput.value = "";
      pitchSpeedInput.value = "";
      selectedPitches = [];
      renderPitchList();
      modeText.textContent = "";
      saveBtn.textContent = "저장";
    }

    function buildPitchText() {
      return selectedPitches.map(p => `${p.name}(${p.speed})`).join(", ");
    }

    function buildPitchRaw() {
      return selectedPitches.map(p => `${p.name}${p.speed}`).join(" ");
    }

    function parsePitchRaw(raw) {
      const arr = String(raw || "").trim().split(" ").filter(Boolean);

      return arr.map(item => {
        const speed = item.match(/(20|30|40)$/)?.[1] || "";
        const name = item.replace(/(20|30|40)$/, "").trim();
        return { name, speed };
      }).filter(v => v.name && v.speed);
    }

    function addPitch() {
      const pitchType = pitchTypeInput.value.trim();
      const pitchSpeed = pitchSpeedInput.value.trim();

      if (!pitchType || !pitchSpeed) {
        alert("구종과 구속 단계를 선택해줘.");
        return;
      }

      selectedPitches.push({
        name: pitchType,
        speed: pitchSpeed
      });

      pitchTypeInput.value = "";
      pitchSpeedInput.value = "";
      renderPitchList();
    }

    async function savePitcher() {
      const name = nameInput.value.trim();
      const team = teamInput.value.trim();
      const angle = angleInput.value.trim();

      if (!name || !team || !angle || selectedPitches.length === 0) {
        alert("모든 값을 입력해줘.");
        return;
      }

      try {
        const pitchRaw = buildPitchRaw();
        const pitchText = buildPitchText();
        const text = `${name}(${angle}) - ${pitchText}`;

        saveBtn.disabled = true;
        saveBtn.textContent = editId ? "수정 중..." : "저장 중...";

        if (editId) {
          await updateDoc(doc(db, "pitchers", editId), {
            name,
            team,
            angle,
            pitchRaw,
            text,
            updatedAt: Date.now()
          });
          alert("수정 완료!");
        } else {
          await addDoc(collection(db, "pitchers"), {
            name,
            team,
            angle,
            pitchRaw,
            text,
            createdAt: Date.now(),
            updatedAt: Date.now()
          });
          alert("추가 완료!");
        }

        resetForm();
      } catch (error) {
        console.error(error);
        alert("저장 중 오류가 발생했어.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "저장";
      }
    }

    function editPitcher(id) {
      const target = pitchers.find(p => p.id === id);
      if (!target) return;

      editId = id;
      nameInput.value = target.name || "";
      teamInput.value = target.team || "";
      angleInput.value = target.angle || "";
      selectedPitches = parsePitchRaw(target.pitchRaw || "");
      renderPitchList();
      modeText.textContent = `수정 중: ${target.name}`;
      saveBtn.textContent = "수정 저장";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function removePitcher(id) {
      const target = pitchers.find(p => p.id === id);
      if (!target) return;

      if (!confirm(`${target.name} 투수 정보를 삭제할까?`)) return;

      try {
        await deleteDoc(doc(db, "pitchers", id));
        alert("삭제 완료!");
        if (editId === id) resetForm();
      } catch (error) {
        console.error(error);
        alert("삭제 중 오류가 발생했어.");
      }
    }

    function renderPitchers(keyword = "") {
      list.innerHTML = "";

      if (pitchers.length === 0) {
        list.innerHTML = `<div class="list-item"><p>등록된 투수 정보가 없어.</p></div>`;
        return;
      }

      const filtered = pitchers.filter(p =>
        p.name.toLowerCase().includes(keyword.toLowerCase())
      );

      if (filtered.length === 0) {
        list.innerHTML = `<div class="list-item"><p>검색 결과가 없어.</p></div>`;
        return;
      }

      const grouped = {};
      filtered.forEach(p => {
        if (!grouped[p.team]) grouped[p.team] = [];
        grouped[p.team].push(p);
      });

      Object.keys(grouped).forEach(team => {
        const color = teamColors[team] || "#999";
        const logo = teamLogos[team] || "";

        list.innerHTML += `
          <div class="team-title" style="color:${color}">
            ${logo ? `<img src="${logo}" class="team-logo" alt="${team} 로고">` : ""}
            ${team}
          </div>
        `;

        grouped[team].forEach(p => {
          list.innerHTML += `
            <div class="list-item" style="border-left:6px solid ${color}">
              <p>${p.text}</p>
              <div class="action-row">
                <button class="pitcher-btn" onclick="window.editPitcher('${p.id}')">수정</button>
                <button class="pitcher-btn delete" onclick="window.removePitcher('${p.id}')">삭제</button>
              </div>
            </div>
          `;
        });
      });
    }

    window.searchPitchers = function () {
      const keyword = document.getElementById("searchInput").value.trim();
      renderPitchers(keyword);
    };

    window.editPitcher = editPitcher;
    window.removePitcher = removePitcher;

    addPitchBtn.addEventListener("click", addPitch);
    saveBtn.addEventListener("click", savePitcher);
    cancelBtn.addEventListener("click", resetForm);

    onSnapshot(collection(db, "pitchers"), (snapshot) => {
      pitchers = [];
      snapshot.forEach((docu) => {
        pitchers.push({
          id: docu.id,
          ...docu.data()
        });
      });
      renderPitchers(document.getElementById("searchInput").value.trim());
    }, (error) => {
      console.error(error);
      list.innerHTML = `<div class="list-item"><p>투수 정보를 불러오지 못했어.</p></div>`;
    });

    renderPitchList();
  </script>
</body>
</html>
