<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레이 마린스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <div class="top-title">
      <h1>레이 마린스</h1>
      <a id="topAccount" class="top-link hidden-link" href="login.html">로그인/회원가입</a>
    </div>

    <div class="menu">
      <a href="roster.html">로스터</a>
      <a href="pitchers.html">투수 정보</a>
      <a id="menuLineup" class="hidden" href="lineup.html">라인업</a>
      <a href="record.html">기록실</a>
      <a id="menuSheet" class="hidden" href="scoresheet.html">기록지</a>
      <a href="mypage.html">마이페이지</a>
    </div>

    <div class="home-box">
      <h2>레이 마린스</h2>
      <p id="welcomeText">환영합니다.</p>

      <div class="home-links">
        <a href="roster.html"><span class="card-title">로스터</span><span class="card-sub">ROSTER</span></a>
        <a href="pitchers.html"><span class="card-title">투수 정보</span><span class="card-sub">PITCHERS</span></a>
        <a id="homeLineup" class="hidden" href="lineup.html"><span class="card-title">라인업</span><span class="card-sub">LINEUP</span></a>
        <a href="record.html"><span class="card-title">기록실</span><span class="card-sub">STATS</span></a>
        <a id="homeSheet" class="hidden" href="scoresheet.html"><span class="card-title">기록지</span><span class="card-sub">SCORESHEET</span></a>
        <a href="mypage.html"><span class="card-title">마이페이지</span><span class="card-sub">MY PAGE</span></a>
        <a id="homePitcherManage" class="hidden" href="pitchers-manage.html"><span class="card-title">투수 정보 관리</span><span class="card-sub">PITCHER MANAGE</span></a>
        <a id="superAdminLink" class="hidden" href="super-admin.html"><span class="card-title long">비공개 관리 페이지</span><span class="card-sub">SUPER ADMIN</span></a>
        <a href="login.html"><span class="card-title">로그인</span><span class="card-sub">LOGIN</span></a>
        <a href="admin.html"><span class="card-title">관리자</span><span class="card-sub">ADMIN</span></a>
      </div>
    </div>
  </div>

  <script>
    const user = JSON.parse(sessionStorage.getItem("currentUser"));
    const topAccount = document.getElementById("topAccount");
    const welcomeText = document.getElementById("welcomeText");

    function isStaff(user) {
      if (!user) return false;
      return user.role === "super_admin" || user.role === "admin" || user.role === "scorer";
    }

    if (user) {
      topAccount.classList.remove("hidden-link");
      topAccount.textContent = `${user.mcNick} / 로그아웃`;
      topAccount.href = "#";
      topAccount.onclick = (e) => {
        e.preventDefault();
        sessionStorage.removeItem("currentUser");
        location.reload();
      };

      let roleText = "선수";

      if (user.role === "owner") roleText = "구단주";
      else if (user.role === "admin") roleText = "관리진";
      else if (user.role === "scorer") roleText = "기록원";
      else if (user.role === "super_admin") roleText = "선수";

      welcomeText.textContent = `${user.mcNick}님 환영합니다. 현재 역할: ${roleText}`;

      if (isStaff(user)) {
        document.getElementById("menuLineup").classList.remove("hidden");
        document.getElementById("menuSheet").classList.remove("hidden");

        document.getElementById("homeLineup").classList.remove("hidden");
        document.getElementById("homeSheet").classList.remove("hidden");
        document.getElementById("homePitcherManage").classList.remove("hidden");
      }

      if (user.role === "super_admin") {
        document.getElementById("superAdminLink").classList.remove("hidden");
      }
    } else {
      topAccount.classList.add("hidden-link");
      welcomeText.textContent = "로그인 후 팀 페이지 기능을 이용할 수 있습니다.";
    }
  </script>
</body>
</html>
