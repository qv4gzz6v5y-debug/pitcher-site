<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레이 마린스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="top-title">
      <h1>레이 마린스</h1>
      <a id="topAccount" class="top-link" href="login.html">로그인/회원가입</a>
    </header>

    <main>
      <section class="home-box">
        <span class="badge">TEAM DASHBOARD</span>
        <h2>팀 메인</h2>
        <p id="welcomeText">로그인 후 팀 페이지 기능을 이용할 수 있습니다.</p>

        <div class="dashboard-grid">
          <a href="roster.html" class="menu-card"><div class="title">로스터</div><div class="sub">ROSTER</div><p>승인된 선수 명단을 확인해요.</p></a>
          <a href="pitchers.html" class="menu-card"><div class="title">투수 정보</div><div class="sub">PITCHERS</div><p>투수 닉네임으로 구종 정보를 검색해요.</p></a>
          <a href="lineup.html" class="menu-card"><div class="title">라인업</div><div class="sub">LINEUP</div><p>연습경기와 리그 경기 라인업을 따로 확인해요.</p></a>
          <a href="record.html" class="menu-card"><div class="title">기록실</div><div class="sub">RECORDS</div><p>연습경기 기록과 리그 기록을 분리해서 봐요.</p></a>
          <a href="mypage.html" class="menu-card"><div class="title">마이페이지</div><div class="sub">MY PAGE</div><p>내 계정 정보와 역할을 확인해요.</p></a>
          <a href="admin.html" class="menu-card"><div class="title">관리자</div><div class="sub">ADMIN</div><p>라인업, 투수 정보, 기록지를 관리해요.</p></a>
        </div>
      </section>
    </main>
  </div>
  <script>
    const user = JSON.parse(sessionStorage.getItem("currentUser"));
    const topAccount = document.getElementById("topAccount");
    const welcomeText = document.getElementById("welcomeText");
    if (user) {
      topAccount.textContent = `${user.mcNick} / 로그아웃`;
      topAccount.href = '#';
      topAccount.onclick = (e) => { e.preventDefault(); sessionStorage.removeItem('currentUser'); location.reload(); };
      const roleMap = { owner:'구단주', admin:'관리진', scorer:'기록원', super_admin:'슈퍼 관리자' };
      welcomeText.textContent = `${user.mcNick}님 환영합니다. 현재 역할: ${roleMap[user.role] || '선수'}`;
    }
  </script>
</body>
</html>
